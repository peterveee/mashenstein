<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- Added to the home screen, the game launches with no browser chrome at all —
     the only true fullscreen iPhone Safari offers, since it has no Fullscreen
     API for a page to ask with (main.js still asks; iPad and Android grant it).
     black-translucent puts the status bar over the canvas rather than above it,
     which with viewport-fit=cover above is what makes the art reach the notch. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MASHENSTEIN">
<!-- Without an apple-touch-icon, iOS puts a SCREENSHOT of the page on the home
     screen — whatever the title screen happened to be showing, shrunk to 60px
     and unreadable. These are rendered from the game's own drawing code by
     tools/render-icon.js and copied into dist/ by the build; a loose
     index.html with no icon files beside it simply has no icon. -->
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0b14">
<title>MASHENSTEIN: The Unpluggening</title>
<script>window.__MASH_BUILT_AT__="__BUILD_TIMESTAMP__";</script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0b14; overflow: hidden; }
  body { touch-action: none; -webkit-user-select: none; user-select: none;
         -webkit-touch-callout: none; overscroll-behavior: none; }
  #game { position: fixed; image-rendering: auto; }
  #chrome { position: fixed; left: 0; top: 0; }
  #boot-error { position: absolute; inset: 0; color: #e0e0e8; font: 14px monospace;
                padding: 2em; display: none; white-space: pre-wrap; }
  #safe-area { position: fixed; inset: 0; visibility: hidden; pointer-events: none;
               padding: env(safe-area-inset-top) env(safe-area-inset-right)
                        env(safe-area-inset-bottom) env(safe-area-inset-left); }

  .mash-install-blocker, .mash-portrait-overlay {
    position: fixed; inset: 0; z-index: 10000; box-sizing: border-box;
    display: flex; align-items: center; justify-content: center;
    padding: calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right))
             calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
    background: radial-gradient(circle at 50% 30%, #20213a 0%, #0b0b14 62%);
    color: #eceef5; font-family: system-ui, -apple-system, sans-serif;
    touch-action: manipulation; user-select: text; -webkit-user-select: text;
  }
  .mash-install-blocker[data-edge="bottom"] { padding-bottom: calc(50px + env(safe-area-inset-bottom)); }
  .mash-install-blocker[data-edge="top"] { padding-top: calc(48px + env(safe-area-inset-top)); }
  .mash-portrait-overlay[hidden] { display: none; }
  .mash-install-card, .mash-portrait-card {
    width: min(27rem, 100%); max-height: 100%; overflow-y: auto;
    -webkit-overflow-scrolling: touch; box-sizing: border-box; padding: 18px 18px 16px;
    border: 1px solid rgba(255,255,255,.16); border-radius: 22px;
    background: linear-gradient(180deg, #191a24, #101119);
    box-shadow: 0 24px 60px rgba(0,0,0,.62), inset 0 1px 0 rgba(255,255,255,.07);
  }
  .mash-install-eyebrow {
    color: #48e0c8; font-size: .66rem; font-weight: 700;
    letter-spacing: .19em; margin-bottom: 3px;
  }
  .mash-install-head { display: flex; align-items: center; gap: 13px; margin-bottom: 11px; }
  .mash-install-icon {
    flex: 0 0 auto; width: 54px; height: 54px; border-radius: 13px;
    box-shadow: 0 4px 14px rgba(0,0,0,.5);

  .mash-install-head h1 { margin-bottom: 0; }
  .mash-install-ui {

  }
  .mash-install-dots { letter-spacing: .09em; padding-inline: 9px; }
  .mash-install-share {

  .mash-install-card h1, .mash-portrait-card h1 {

    line-height: 1.02; margin: 0;
  }
  .mash-install-card h1:focus-visible, .mash-portrait-card h1:focus-visible {
    outline: 3px solid #48e0c8; outline-offset: 5px; border-radius: 3px;

  .mash-install-steps { margin: 0 0 12px; padding: 0; list-style: none; counter-reset: step; }
  .mash-install-steps li {
    display: flex; align-items: flex-start; gap: 12px; padding: 10px 13px;
    border: 1px solid rgba(255,255,255,.07); border-radius: 14px;
    background: rgba(255,255,255,.045); font-size: .97rem; line-height: 1.5;
  }
  .mash-install-steps li + li { margin-top: 6px; }
  .mash-install-steps li::before {
    counter-increment: step; content: counter(step); flex: 0 0 auto;

    color: #06231e; background: #48e0c8; text-align: center;
    font-weight: 800; line-height: 24px;

  .mash-install-steps li > span { flex: 1 1 auto; min-width: 0; }
  .mash-install-card p.mash-install-note {

  .mash-install-arrow {

  }
  .mash-install-blocker[data-side="center"] .mash-install-arrow { left: 50%; margin-left: -14px; }
  .mash-install-blocker[data-side="right"] .mash-install-arrow { right: 46px; }
  .mash-install-blocker[data-edge="bottom"] .mash-install-arrow {
    bottom: calc(7px + env(safe-area-inset-bottom)); animation: mash-install-down 1.4s ease-in-out infinite;
  }
  .mash-install-blocker[data-edge="top"] .mash-install-arrow {
    top: calc(5px + env(safe-area-inset-top)); animation: mash-install-up 1.4s ease-in-out infinite;
  }
  @keyframes mash-install-down { 50% { transform: translateY(7px); } }
  @keyframes mash-install-up { 50% { transform: translateY(-7px); } }
  @media (prefers-reduced-motion: reduce) { .mash-install-arrow { animation: none; } }
  .mash-portrait-card { text-align: center; max-width: 29rem; }
  .mash-phone-turn { color: #48e0c8; font-size: 4.5rem; line-height: 1; margin-bottom: 8px; }
  .mash-portrait-card p { margin-bottom: 0; }
  .mash-portrait-card p.mash-build-time {
    margin-top: 14px; color: #8e94a6; font: 700 .72rem/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: .07em; text-transform: uppercase;
  }
  @media (orientation: landscape) and (max-height: 480px) {

    .mash-install-cols { display: grid; grid-template-columns: 1fr 1.15fr; gap: 20px; }
    .mash-install-steps { margin-bottom: 7px; }
    .mash-install-steps li { padding: 8px 10px; font-size: .82rem; }
    .mash-install-why li { padding: 4px 9px; font-size: .76rem; }
  }
</style>
