<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- Added to the home screen, the game launches with no browser chrome at all —
     the only true fullscreen iPhone Safari offers, since it has no Fullscreen
     API for a page to ask with (main.js still asks; iPad and Android grant it).
     black-translucent puts the status bar over the canvas rather than above it,
     which with viewport-fit=cover above is what makes the art reach the notch. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MASHENSTEIN">
<title>MASHENSTEIN: The Unpluggening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@400..600&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0b14; overflow: hidden; }
  body { touch-action: none; -webkit-user-select: none; user-select: none;
         -webkit-touch-callout: none; overscroll-behavior: none; }
  #game { position: fixed; image-rendering: auto; }
  #boot-error { position: absolute; inset: 0; color: #e0e0e8; font: 14px monospace;
                padding: 2em; display: none; white-space: pre-wrap; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="boot-error"></div>
<script>
window.addEventListener('error', function (e) {
  var el = document.getElementById('boot-error');
  if (el && !window.__mash_booted) {
    el.style.display = 'block';
    el.textContent = 'MASHENSTEIN failed to boot (the arcade remains unplugged):\n\n' + (e.message || e.error);
  }
});
</script>
<script>/*__BUNDLE__*/</script>
</body>
</html>
