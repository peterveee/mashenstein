<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MASHENSTEIN — Asset Gallery</title>
<style>
  :root { --bg:#0b0b14; --panel:#15151f; --panel2:#1a1a28; --line:#2a2a3a; --ink:#e0e0e8; --dim:#8a8a9e;
          --accent:#f6d33c; --accent-soft:rgba(246,211,60,0.1); }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
               font:13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
  body { background-image:radial-gradient(ellipse 900px 500px at 15% -10%, rgba(246,211,60,0.05), transparent); }
  header { position:sticky; top:0; z-index:10; background:rgba(11,11,20,0.94);
           backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 20px; }
  h1 { margin:0 0 8px; font-size:15px; letter-spacing:0.08em; font-weight:600;
       background:linear-gradient(90deg, var(--accent), #ffe98a); -webkit-background-clip:text;
       background-clip:text; color:transparent; }
  h1 small { color:var(--dim); font-weight:normal; letter-spacing:0; margin-left:10px; }
  .controls { display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .controls label { display:flex; gap:6px; align-items:center; color:var(--dim); cursor:pointer; }
  .controls select, .controls button, .controls input[type=search] {
    background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:5px;
    padding:3px 8px; font:inherit; }
  .controls button { color:var(--dim); cursor:pointer; }
  .controls button:hover { color:var(--accent); border-color:var(--accent); }
  nav { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; align-items:center; }
  nav a { color:var(--dim); text-decoration:none; padding:2px 9px; border:1px solid var(--line); border-radius:99px;
          transition:color .12s ease, border-color .12s ease, background .12s ease; }
  nav a:hover { color:var(--accent); border-color:var(--accent); }
  nav a.active { color:var(--accent); border-color:var(--accent); background:var(--accent-soft); }
  nav a .nav-count { opacity:0.55; font-size:9px; margin-left:5px; }
  nav .nav-sep { color:var(--dim); font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
                 margin-left:6px; padding-left:10px; border-left:1px solid var(--line); opacity:0.7; }
  main { padding:20px; }
  section { margin-bottom:34px; }
  section > h2 { font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent);
                 border-bottom:1px solid var(--line); padding-bottom:6px; margin:0 0 4px; scroll-margin-top:120px;
                 cursor:pointer; user-select:none; display:flex; align-items:center; gap:7px; }
  section > h2::before { content:'▾'; font-size:9px; color:var(--dim); display:inline-block;
                         transition:transform .15s ease; }
  section.collapsed > h2::before { transform:rotate(-90deg); }
  section.collapsed > h2 { color:var(--dim); }
  section.collapsed > *:not(h2) { display:none; }
  body.filtering section.collapsed > .grid { display:flex; }
  body.filtering section.collapsed > p.note, body.filtering section.collapsed > h3.subhead { display:block; }
  section > p.note { color:var(--dim); margin:0 0 12px; }
  h3.subhead { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim);
               font-weight:normal; margin:16px 0 8px; }
  h3.subhead:first-of-type { margin-top:4px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:8px;
          display:flex; flex-direction:column; align-items:center; gap:6px;
          transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
  .card:hover { transform:translateY(-2px); border-color:#454564; box-shadow:0 8px 20px rgba(0,0,0,0.4); }
  .card canvas { display:block; image-rendering:pixelated; border-radius:3px; cursor:pointer; }
  .card .name { color:var(--dim); font-size:11px; text-align:center; max-width:100%; word-break:break-word; }
  .card .name b { color:var(--ink); font-weight:normal; }
  .card.wide { width:100%; }
  .card.err { border-color:#e04848; }
  .card.err:hover { border-color:#e04848; }
  .card.err .name { color:#e04848; }
  /* Swatch backdrops behind transparent art. */
  .bg-dark canvas   { background:#12121c; }
  .bg-light canvas  { background:#d8d8e4; }
  .bg-checker canvas{ background-color:#7a7a8a;
    background-image:linear-gradient(45deg,#5a5a6a 25%,transparent 25%,transparent 75%,#5a5a6a 75%),
                     linear-gradient(45deg,#5a5a6a 25%,transparent 25%,transparent 75%,#5a5a6a 75%);
    background-size:12px 12px; background-position:0 0, 6px 6px; }
  .bg-none canvas   { background:transparent; }
  #err { color:#e04848; white-space:pre-wrap; padding:20px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>MASHENSTEIN — ASSET GALLERY <small>dev build · click any tile to save a PNG</small></h1>
  <div class="controls">
    <label>zoom
      <select id="zoom">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3" selected>3x</option>
        <option value="4">4x</option>
        <option value="6">6x</option>
        <option value="8">8x</option>
        <option value="12">12x</option>
        <option value="16">16x</option>
        <option value="24">24x</option>
        <option value="32">32x</option>
      </select>
    </label>
    <label>render
      <!-- Render density, which is NOT the zoom. Zoom stretches the finished
           bitmap (image-rendering:pixelated, so it blocks up); this re-renders
           the vectors denser. On-screen magnification is zoom/render, so 3x+3x
           is 1:1 and picking a render ABOVE the zoom supersamples — the read
           you want when judging hairline weights. 6x costs 4x the canvas
           memory across ~460 tiles, so it is opt-in rather than the default. -->
      <select id="resolution">
        <option value="1">logical</option>
        <option value="3" selected>high-res 3x</option>
        <option value="6">high-res 6x</option>
      </select>
    </label>
    <label>backdrop
      <select id="backdrop">
        <option value="checker">checker</option>
        <option value="dark" selected>dark</option>
        <option value="light">light</option>
        <option value="none">none</option>
      </select>
    </label>
    <label><input id="animate" type="checkbox" checked> animate</label>
    <label>filter <input id="filter" type="search" placeholder="name…" size="14"></label>
    <button id="collapseAll" type="button">collapse all</button>
  </div>
  <nav id="nav"></nav>
</header>
<main id="root"></main>
<div id="err"></div>
<script>
window.addEventListener('error', function (e) {
  document.getElementById('err').textContent =
    'Gallery failed to boot:\n\n' + (e.error && e.error.stack || e.message);
});
</script>
<script>(() => {

attribute vec2 aP;
varying vec2 vUv;
void main() { vUv = aP * 0.5 + 0.5; gl_Position = vec4(aP, 0.0, 1.0); }`;

// twinkle rate. Core + halo + a faint diffraction cross, so bright ones read

// left a hole: gradient, drifting nebula, three parallax star grids, and a
// shooting star that crosses every few seconds.
vec3 skyColor(vec2 uv, float t) {

  col = mix(col, vec3(0.110, 0.078, 0.188), smoothstep(0.65, 1.0, sy));

  float across = abs(dot(rel, vec2(-dir.y, dir.x)));

  trail += smoothstep(0.03, 0.0, length(rel)) * 1.6;

    // The status-pill battery cells. These are NOT the `battery` pickup above:
    // that one is a chunky upright cell drawn to read as a thing lying in the
    // world, and four of them in a row at HUD size turn into a picket fence. The
    // HUD wants a lozenge — wide, low, with the bolt reading at 11 units across —
    // so it gets its own art in the panel's colour language.
    //
    // Full and empty are separate painters rather than one with a flag because
    // the sprite cache is keyed by name; a flag would collide on one entry.
    cellFull(ctx, w, h) {
      hudCell(ctx, w, h, true);
    },
    cellEmpty(ctx, w, h) {
      hudCell(ctx, w, h, false);
    },
    // The coin beside them. The world `coin` is a flat disc with a stamped
    // centre, which at 12 units in a dark panel reads as a washer; this one is a
    // lit sphere — gradient plus a warm rim — so it holds its shape and stays
    // legibly gold against the slate fill.
    hudCoin(ctx, w, h) {
      const r = Math.min(w, h) / 2;
      const g = ctx.createRadialGradient(w * 0.36, h * 0.32, r * 0.15, w * 0.5, h * 0.5, r);
      g.addColorStop(0, "#ffe07a");
      g.addColorStop(1, "#f0b419");
      ctx.beginPath();
      ctx.arc(w / 2, h / 2, r - r / 12, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = "#d99a10";
      ctx.lineWidth = r / 6;
      ctx.stroke();

      f.connect(g);
      g.connect(this.sfxGain);
      src.start(t);
      src.stop(t + dur + 0.02);

    // The title sign shorting out.
    //
    // Runs on the SFX bus, NOT the music bus, and that routing is the whole point
    // of where it sits: the echo send is fed from musicGain, so anything on the
    // music bus is echoed whether it wants to be or not. A buzzing sign is a
    // physical object a few feet away, not something ringing around the arcade,
    // so it has to bypass that send entirely. sfxGain connects straight to master.
    //
    // Three things make this read as a BUZZ rather than the thud it used to be:
    // it lasts long enough to hear (a 0.1s blip is a click, the ear needs a few
    // cycles of stutter to call something a buzz); the tone keeps its harmonics
    // instead of being lowpassed down to a bare sine; and the whole thing is
    // chopped by a stutter gate, which is the actual sound of a contact
    // chattering rather than a tube humming.

    // detail — the sign you only notice once you have stopped reading the menu —
    // not a cue, and it repeats forever on the title screen, so anything that
    // announces itself becomes a tic. Scale the whole thing from `q` rather than
    // editing four envelope points to change how loud it is.

    // cueGain itself or an SFX_TRIM entry for it would silently do nothing.
    neonBuzz() {
      if (!this.ctx || !this.sfxGain) return;
      const t = this.ctx.currentTime;
      const DUR = 0.34;
      const q = this.cueGain * 0.4;
      const gate = this.ctx.createGain();
      gate.gain.value = 0.6;
      const lfo = this.ctx.createOscillator();
      lfo.type = "square";
      lfo.frequency.setValueAtTime(46, t);
      lfo.frequency.linearRampToValueAtTime(29, t + DUR);

      lfoDepth.gain.value = 0.4;
      lfo.connect(lfoDepth);
      lfoDepth.connect(gate.gain);
      gate.connect(this.sfxGain);

      o.type = "sawtooth";
      o.frequency.setValueAtTime(720, t);
      o.frequency.linearRampToValueAtTime(676, t + DUR);

      o2.type = "square";
      o2.frequency.setValueAtTime(1455, t);

      o2g.gain.value = 0.24;

      ohp.type = "highpass";
      ohp.frequency.value = 520;
      const of = this.ctx.createBiquadFilter();
      of.type = "lowpass";
      of.frequency.value = 5200;
      of.Q.value = 0.9;

      og.gain.exponentialRampToValueAtTime(6e-3 * q, t + 0.014);
      og.gain.exponentialRampToValueAtTime(34e-4 * q, t + 0.16);
      og.gain.exponentialRampToValueAtTime(1e-4, t + DUR);

      o2g.connect(ohp);

      og.connect(gate);

      ng.gain.exponentialRampToValueAtTime(9e-4 * q, t + 0.13);

      nf.connect(ng);
      ng.connect(gate);
      src.start(t);
      src.stop(t + DUR);

      o.type = "sine";
      o.frequency.setValueAtTime(520, t);
      o.frequency.exponentialRampToValueAtTime(920, t + 0.52);
      o.frequency.exponentialRampToValueAtTime(610, t + 1.25);

      f.frequency.value = 1900;
      f.Q.value = 0.8;

      g.gain.exponentialRampToValueAtTime(0.026, t + 0.2);
      g.gain.exponentialRampToValueAtTime(0.013, t + 0.72);
      g.gain.exponentialRampToValueAtTime(1e-4, t + 1.3);

      f.connect(g);

    // A jump you can actually hear rising: one square wave gliding up over two

    // top of the glide, which is what made the old one feel flat.
    jumpTone(when = 0, pitch = 1, gain = 0.2) {
      if (!this.ctx) return;
      const t = this.ctx.currentTime + when;
      const dur = 0.17;
      const o = this.ctx.createOscillator();
      const f = this.ctx.createBiquadFilter();
      const g = this.ctx.createGain();
      o.type = "square";
      f.type = "lowpass";

      o.frequency.setValueAtTime(200 * pitch, t);

      g.gain.exponentialRampToValueAtTime(peak, t + 5e-3);
      g.gain.setValueAtTime(peak, t + dur * 0.45);
      g.gain.exponentialRampToValueAtTime(1e-4, t + dur + 0.03);
      o.connect(f);
      f.connect(g);
      g.connect(this.sfxGain);
      o.start(t);
      o.stop(t + dur + 0.05);

    // One PAC-style bite: pitch and filter glide down as the mouth closes and
    // back up as it opens. The glide is what makes it read as "waka" rather
    // than a beep — a square through a resonant lowpass keeps the mouthy timbre.
    // `hold` is the fraction of the note spent at full level before the release.

    waka(when = 0, pitch = 1, gain = 0.13, hold = 0.75) {

      const dur = 0.12;
      const o = this.ctx.createOscillator();
      const f = this.ctx.createBiquadFilter();
      const g = this.ctx.createGain();
      o.type = "square";
      f.type = "lowpass";

      o.frequency.linearRampToValueAtTime(940 * pitch, t + dur);
      f.frequency.setValueAtTime(2600 * pitch, t);
      f.frequency.linearRampToValueAtTime(700 * pitch, t + dur * 0.5);
      f.frequency.linearRampToValueAtTime(2400 * pitch, t + dur);
      g.gain.setValueAtTime(1e-4, t);
      const peak = gain * this.cueGain;
      g.gain.exponentialRampToValueAtTime(peak, t + 6e-3);
      g.gain.setValueAtTime(peak, t + dur * hold);
      g.gain.exponentialRampToValueAtTime(1e-4, t + dur + 0.01);
      o.connect(f);
      f.connect(g);
      g.connect(this.sfxGain);
      o.start(t);
      o.stop(t + dur + 0.03);

        // Quieter than 'coin' on purpose: it's a square wave (loud for its
        // amplitude) and it fires more often than any other cue in the game.
        case "jump":
          this.jumpTone(0, 1, 0.055);
          break;
        case "jump2":
          this.jumpTone(0, 1.5, 0.045);
          break;

        case "land":
          this.noise(0.06, 0.15, "lowpass", 400);
          break;
        case "coin":
          this.osc("square", 988 * pitch, 988 * pitch, 0.06, 0.12);
          this.osc("square", 1319 * pitch, 1319 * pitch, 0.07, 0.12, 0.06);
          break;
        case "power":
          [523, 659, 784, 1047].forEach((f, i) => this.osc("triangle", f, f, 0.09, 0.15, i * 0.07));
          break;
        case "shield":
          this.noise(0.2, 0.2, "highpass", 2e3);
          this.osc("sawtooth", 220, 80, 0.25, 0.18);
          break;
        // Invincibility on: a fast rising run that lands on an octave shimmer.
        case "star":

          break;
        // ...and off: the same run walking back down, quieter.
        case "starEnd":
          [1568, 1319, 1047, 784].forEach((f, i) => this.osc("triangle", f, f, 0.09, 0.1, i * 0.06));
          break;
        case "hit":
          this.osc("sawtooth", 200, 40, 0.4, 0.25);
          this.noise(0.15, 0.2, "lowpass", 900);
          break;
        case "die":
          [330, 262, 220, 165].forEach((f, i) => this.osc("triangle", f, f, 0.14, 0.18, i * 0.15));
          break;
        case "dash":
          this.noise(0.3, 0.18, "bandpass", 1800);
          break;
        case "shoot":
          this.osc("square", 900, 500, 0.08, 0.14);
          break;
        case "axe":

          this.osc("square", 300, 500, 0.2, 0.08);
          break;
        case "crunch":

          this.noise(0.22, 0.26, "bandpass", 950);
          this.osc("sine", 190, 45, 0.2, 0.32);
          this.osc("square", 620, 300, 0.09, 0.12, 0.01);
          [0.07, 0.13, 0.19].forEach((d, i) => this.noise(0.05, 0.11 - i * 0.03, "bandpass", 2400 - i * 500, d));
          break;

            const when = 0.045 + i * 0.055;
            const g = 0.13 - i * 6e-3;

          break;

          this.osc("sine", 750, 1500, 0.12, 0.1, 0.03);
          break;
        case "perfect":
          [660, 880, 1320].forEach((f, i) => this.osc("sine", f, f, 0.08, 0.14, i * 0.05));
          break;
        case "ui":
          this.osc("sine", 1200, 1200, 0.05, 0.1);
          break;
        case "uiConfirm":
          this.osc("sine", 900, 900, 0.05, 0.1);
          this.osc("sine", 1350, 1350, 0.06, 0.1, 0.05);
          break;
        case "uiBad":
          this.osc("square", 200, 150, 0.15, 0.12);

        case "lose":

          break;

      tile(
        grid,
        d.name,
        "lit",
        BW,
        BH,
        (ctx, t) => drawWallBay(ctx, 0, 0, BW, BH, id, { t, seed: 3, lit: 1, pal: litPal }),
        { animated: true }
      );
      tile(
        grid,
        d.name,
        "unlit \u2014 same art, no power",
        BW,
        BH,
        (ctx, t) => drawWallBay(ctx, 0, 0, BW, BH, id, { t, seed: 3, lit: 0.12, pal: litPal }),
        { animated: true }
      );
      tile(
        grid,
        d.name,
        "in place, cabinet in front",
        BW,
        BH,
        (ctx, t) => {
          drawWallBay(ctx, 0, 0, BW, BH, id, { t, seed: 3, lit: 0.9, pal: litPal });
          const cy = BH - 2 - CS.h;
          drawCabinetShell(ctx, BW / 2 - CS.w / 2, cy, CS.w, CS.h, litPal);
          const scr = drawCabinetScreen(ctx, BW / 2 - CS.w / 2, cy, CS.w, CS.h, litPal);
          if (scr) drawScreenSweep(ctx, scr, t, pal.seed);
        },
        { animated: true }
      );
    }
    const falloff = (x) => wallLitAt(x, 2, BW);
    for (const [id, d] of Object.entries(WALL_DRESSINGS)) {
      tile(
        grid,
        `${d.name} \u2014 falloff`,
        "4 bays, 2 lights working, one lit gradient over the lot",
        BW * 4,
        BH,
        (ctx, t) => {
          for (let b = 0; b < 4; b++) {
            drawWallBay(ctx, b * BW, 0, BW, BH, id, { t, seed: b, lit: 1, pal: litPal });
          }
          for (let b = 0; b < 4; b++) {
            const bx = b * BW;
            const pal3 = cabinetPalette(CABINETS[b % CABINETS.length], true);
            const cy = BH - 2 - CS.h;
            drawCabinetShell(ctx, bx + BW / 2 - CS.w / 2, cy, CS.w, CS.h, pal3);
            const scr = drawCabinetScreen(ctx, bx + BW / 2 - CS.w / 2, cy, CS.w, CS.h, pal3);
            if (scr) drawScreenSweep(ctx, scr, t, pal3.seed);
          }
          shadeWall(ctx, 0, 0, BW * 4, BH, falloff);
          for (let b = 0; b < 4; b++) {
            ctx.fillStyle = b < 2 ? "#f6d33c" : "#30303f";
            ctx.fillRect(b * BW + BW / 2 - 13, 6, 26, 4);
          }
        },
        { animated: true, wide: true }
      );
    }
  }
  {
    const grid = section(
      "ink-bakeoff",
      "Outline weight bake-off",
      "One rig, five ink weights. `face` scales the eye/brow/mouth strokes, `body` scales the contour `ow`, `alpha` scales the outline colors \u2014 see INK in toons.js. `current` is what ships; `was` winds the face strokes back to their pre-2026-07-22 weights, when the eye ring was drawn wider than the contour around it. Each row is the same hero at three scales: the 60u gallery pose, the 32px HUD face crop, and the real in-run 24u sprite at 2x world zoom. Judge on the 24u column, not the big one \u2014 the stroke floors only bind down there, and that is where the game actually lives."
    );
    const TREATMENTS = [
      ["current", "shipped \u2014 0.011u ring, 0.016u contour", { body: 1, face: 1, alpha: 1 }],
      ["was", "pre-thin-face \u2014 0.020u ring over a 0.016u contour", { body: 1, face: 1.818, alpha: 1 }],
      ["thinner face", "ring \u21920.008u, if current still reads heavy", { body: 1, face: 0.72, alpha: 1 }],
      ["thin body", "contour 0.016u\u21920.011u \xB7 face as shipped", { body: 0.7, face: 1, alpha: 1 }],
      ["soft", "no geometry change \xB7 outline alpha 0.32\u21920.20", { body: 1, face: 1, alpha: 0.62 }]
    ];
    const IDS = ["grumpos", "lorenzo", "b33p"];
    const HH = 60;
    const CELL = 78, LABEL_W = 62, HEAD_ROWS = [["60u", HH], ["24u", HERO_DRAW_H]];
    const HEAD_SPAN = 0.62;
    const headCell = (ctx, id, h, cellX, cellY, phase) => {
      const anchor = TOON_SPECS[id].heavy ? 0.978 : 0.76;
      ctx.save();
      ctx.beginPath();
      ctx.rect(cellX, cellY, CELL, CELL);
      ctx.clip();
      ctx.translate(cellX + CELL / 2, cellY + CELL / 2);
      ctx.scale(CELL / (HEAD_SPAN * h), CELL / (HEAD_SPAN * h));
      drawToon(ctx, id, pose("run", phase), 0, anchor * h, h);
      ctx.restore();
    };
    const PHASE = 0.42;
    for (const id of IDS) {
      const cmpW = LABEL_W + TREATMENTS.length * CELL;
      const cmpH = 14 + HEAD_ROWS.length * CELL;
      tile(grid, `${id} \u2014 head to head`, "all five treatments, frozen, 6x supersampled", cmpW, cmpH, (ctx) => {
        ctx.font = "bold 7px ui-monospace, monospace";
        ctx.fillStyle = "#8a8a9a";
        ctx.textBaseline = "alphabetic";
        TREATMENTS.forEach(([name], i) => {
          ctx.fillText(name, LABEL_W + i * CELL + 4, 9);
        });
        HEAD_ROWS.forEach(([rowLabel, h], r) => {
          const y = 14 + r * CELL;
          ctx.fillStyle = "#8a8a9a";
          ctx.fillText(rowLabel, 4, y + CELL / 2);
          TREATMENTS.forEach(([, , ink], i) => {
            setInk(ink);
            try {
              headCell(ctx, id, h, LABEL_W + i * CELL, y, PHASE);
            } finally {
              setInk();
            }
          });
        });
        ctx.strokeStyle = "rgba(255,255,255,0.07)";
        ctx.lineWidth = 0.4;
        ctx.beginPath();
        for (let i = 0; i <= TREATMENTS.length; i++) {
          ctx.moveTo(LABEL_W + i * CELL, 12);
          ctx.lineTo(LABEL_W + i * CELL, cmpH);
        }
        for (let r = 0; r <= HEAD_ROWS.length; r++) {
          ctx.moveTo(LABEL_W, 14 + r * CELL);
          ctx.lineTo(cmpW, 14 + r * CELL);
        }
        ctx.stroke();
      }, { wide: true, hires: 6 });
    }
    const POSE_W = Math.round(HH * 0.9), POSE_H = Math.round(HH * 1.3);
    const FACE = 34;
    const RUN_Z = 2;
    const RUN_W = (HERO_DRAW_W + 10) * RUN_Z, RUN_H = (HERO_DRAW_H + 8) * RUN_Z;
    const GAP = 6;
    const TW = POSE_W + GAP + FACE + GAP + RUN_W;
    const TH = Math.max(POSE_H, FACE, RUN_H);
    for (const id of IDS) {
      for (const [name, note, ink] of TREATMENTS) {
        tile(grid, `${id} \u2014 ${name}`, note, TW, TH, (ctx, t) => {
          setInk(ink);
          try {
            drawToon(ctx, id, pose("run", t), POSE_W / 2, POSE_H - HH * 0.05, HH);
            const fx = POSE_W + GAP;
            drawToonFace(ctx, id, fx, (TH - FACE) / 2, FACE, FACE);
            ctx.save();
            ctx.translate(fx + FACE + GAP, 0);
            ctx.scale(RUN_Z, RUN_Z);
            drawToon(ctx, id, pose("run", t), (HERO_DRAW_W + 10) / 2, RUN_H / RUN_Z - 4, HERO_DRAW_H);
            ctx.restore();
          } finally {
            setInk();
          }
        }, { animated: true, wide: true });
      }
    }
  }
  var io = new IntersectionObserver((entries) => {
    for (const en of entries) {
      const t = tiles.find((x) => x.card === en.target);
      if (t) t.visible = en.isIntersecting;
    }
  }, { rootMargin: "200px" });
  for (const t of tiles) io.observe(t.card);
  for (const t of tiles) paint(t, 0);
  var start = performance.now();
  function frame(now) {
    const t = Math.max(0, (now - start) / 1e3);
    if (animate) {
      for (const e of tiles) if (e.animated && e.visible) paint(e, t);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  window.__gallery = {
    tiles,
    paint,
    drawToon,
    TOON_SPECS,
    HERO_DRAW_H,
    get errors() {
      return tiles.filter((t) => t.stack);
    }
  };
  for (const a of nav.querySelectorAll("a[data-target]")) {
    const sec = document.getElementById(a.dataset.target);
    const badge = document.createElement("span");
    badge.className = "nav-count";
    badge.textContent = sec ? sec.querySelectorAll(".card").length : 0;
    a.appendChild(badge);
  }
  var navSpy = new IntersectionObserver((entries) => {
    for (const en of entries) {
      if (!en.isIntersecting) continue;
      for (const a of nav.querySelectorAll("a[data-target]")) {
        a.classList.toggle("active", a.dataset.target === en.target.id);
      }
    }
  }, { rootMargin: "-96px 0px -70% 0px" });
  for (const s of root.querySelectorAll("section")) navSpy.observe(s);
  for (const h2 of root.querySelectorAll("section > h2")) {
    h2.addEventListener("click", () => h2.closest("section").classList.toggle("collapsed"));
  }
  var collapseAllEl = document.getElementById("collapseAll");
  collapseAllEl.addEventListener("click", () => {
    const sections = [...root.querySelectorAll("section")];
    const collapsing = !sections.every((s) => s.classList.contains("collapsed"));
    for (const s of sections) s.classList.toggle("collapsed", collapsing);
    collapseAllEl.textContent = collapsing ? "expand all" : "collapse all";
  });
  document.querySelector("h1 small").textContent = `dev build \xB7 click any tile to save a PNG \xB7 ${tiles.length} tiles across ${root.querySelectorAll("section").length} sections`;
  function applyZoom() {
    for (const t of tiles) {
      t.canvas.style.width = (t.fixed ? t.w : t.w * zoom) + "px";
      t.canvas.style.height = (t.fixed ? t.h : t.h * zoom) + "px";
    }
  }
  var zoomEl = document.getElementById("zoom");
  zoomEl.addEventListener("change", () => {
    zoom = +zoomEl.value;
    applyZoom();
  });
  var resolutionEl = document.getElementById("resolution");
  resolutionEl.addEventListener("change", () => {
    renderScale = +resolutionEl.value;
    resizeTiles();
  });
  function applyBackdrop(mode) {
    document.body.classList.remove("bg-checker", "bg-dark", "bg-light", "bg-none");
    document.body.classList.add("bg-" + mode);
  }
  var bdEl = document.getElementById("backdrop");
  bdEl.addEventListener("change", () => applyBackdrop(bdEl.value));
  var animEl = document.getElementById("animate");
  animEl.addEventListener("change", () => {
    animate = animEl.checked;
    if (!animate) return;
    start = performance.now();
  });
  var filterEl = document.getElementById("filter");
  filterEl.addEventListener("input", () => {
    const q = filterEl.value.trim().toLowerCase();
    document.body.classList.toggle("filtering", !!q);
    for (const t of tiles) t.card.style.display = !q || t.card.dataset.search.includes(q) ? "" : "none";
  });
  applyZoom();
  applyBackdrop(bdEl.value);
  for (const t of tiles) {
    if (t.w === W && t.h === H) {
      t.canvas.style.width = W + "px";
      t.canvas.style.height = H + "px";
      t.fixed = true;
    }
  }
})();
</script>
</body>
