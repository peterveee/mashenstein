<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MASHENSTEIN — Asset Gallery</title>
<style>
  :root { --bg:#0b0b14; --panel:#15151f; --panel2:#1a1a28; --line:#2a2a3a; --ink:#e0e0e8; --dim:#8a8a9e;
          --accent:#f6d33c; --accent-soft:rgba(246,211,60,0.1); }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
               font:13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
  body { background-image:radial-gradient(ellipse 900px 500px at 15% -10%, rgba(246,211,60,0.05), transparent); }
  header { position:sticky; top:0; z-index:10; background:rgba(11,11,20,0.94);
           backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 20px; }
  h1 { margin:0 0 8px; font-size:15px; letter-spacing:0.08em; font-weight:600;
       background:linear-gradient(90deg, var(--accent), #ffe98a); -webkit-background-clip:text;
       background-clip:text; color:transparent; }
  h1 small { color:var(--dim); font-weight:normal; letter-spacing:0; margin-left:10px; }
  .controls { display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .controls label { display:flex; gap:6px; align-items:center; color:var(--dim); cursor:pointer; }
  .controls select, .controls button, .controls input[type=search] {
    background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:5px;
    padding:3px 8px; font:inherit; }
  .controls button { color:var(--dim); cursor:pointer; }
  .controls button:hover { color:var(--accent); border-color:var(--accent); }
  nav { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; align-items:center; }
  nav a { color:var(--dim); text-decoration:none; padding:2px 9px; border:1px solid var(--line); border-radius:99px;
          transition:color .12s ease, border-color .12s ease, background .12s ease; }
  nav a:hover { color:var(--accent); border-color:var(--accent); }
  nav a.active { color:var(--accent); border-color:var(--accent); background:var(--accent-soft); }
  nav a .nav-count { opacity:0.55; font-size:9px; margin-left:5px; }
  nav .nav-sep { color:var(--dim); font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
                 margin-left:6px; padding-left:10px; border-left:1px solid var(--line); opacity:0.7; }
  main { padding:20px; }
  section { margin-bottom:34px; }
  section > h2 { font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent);
                 border-bottom:1px solid var(--line); padding-bottom:6px; margin:0 0 4px; scroll-margin-top:120px;
                 cursor:pointer; user-select:none; display:flex; align-items:center; gap:7px; }
  section > h2::before { content:'▾'; font-size:9px; color:var(--dim); display:inline-block;
                         transition:transform .15s ease; }
  section.collapsed > h2::before { transform:rotate(-90deg); }
  section.collapsed > h2 { color:var(--dim); }
  section.collapsed > *:not(h2) { display:none; }
  body.filtering section.collapsed > .grid { display:flex; }
  body.filtering section.collapsed > p.note, body.filtering section.collapsed > h3.subhead { display:block; }
  section > p.note { color:var(--dim); margin:0 0 12px; }
  h3.subhead { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim);
               font-weight:normal; margin:16px 0 8px; }
  h3.subhead:first-of-type { margin-top:4px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:8px;
          display:flex; flex-direction:column; align-items:center; gap:6px;
          transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
  .card:hover { transform:translateY(-2px); border-color:#454564; box-shadow:0 8px 20px rgba(0,0,0,0.4); }
  .card canvas { display:block; image-rendering:pixelated; border-radius:3px; cursor:pointer; }
  /* Vector assets that are judged by their silhouette can opt into a dense
     backing canvas and smooth browser downsampling instead of the gallery's
     default nearest-neighbour pixel inspection. */
  .card canvas.smooth-preview { image-rendering:auto; }
  .card .name { color:var(--dim); font-size:11px; text-align:center; max-width:100%; word-break:break-word; }
  .card .name b { color:var(--ink); font-weight:normal; }
  .card.wide { width:100%; }
  .card.err { border-color:#e04848; }
  .card.err:hover { border-color:#e04848; }
  .card.err .name { color:#e04848; }
  /* Swatch backdrops behind transparent art. */
  .bg-dark canvas   { background:#12121c; }
  .bg-light canvas  { background:#d8d8e4; }
  .bg-checker canvas{ background-color:#7a7a8a;
    background-image:linear-gradient(45deg,#5a5a6a 25%,transparent 25%,transparent 75%,#5a5a6a 75%),
                     linear-gradient(45deg,#5a5a6a 25%,transparent 25%,transparent 75%,#5a5a6a 75%);
    background-size:12px 12px; background-position:0 0, 6px 6px; }
  .bg-none canvas   { background:transparent; }
  #err { color:#e04848; white-space:pre-wrap; padding:20px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>MASHENSTEIN — ASSET GALLERY <small>dev build · click any tile to save a PNG</small></h1>
  <div class="controls">
    <label>zoom
      <select id="zoom">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3" selected>3x</option>
        <option value="4">4x</option>
        <option value="6">6x</option>
        <option value="8">8x</option>
        <option value="12">12x</option>
        <option value="16">16x</option>
        <option value="24">24x</option>
        <option value="32">32x</option>
      </select>
    </label>
    <label>render
      <!-- Render density, which is NOT the zoom. Zoom stretches the finished
           bitmap (image-rendering:pixelated, so it blocks up); this re-renders
           the vectors denser. On-screen magnification is zoom/render, so 3x+3x
           is 1:1 and picking a render ABOVE the zoom supersamples — the read
           you want when judging hairline weights. 6x costs 4x the canvas
           memory across ~460 tiles, so it is opt-in rather than the default. -->
      <select id="resolution">
        <option value="1">logical</option>
        <option value="3" selected>high-res 3x</option>
        <option value="6">high-res 6x</option>
      </select>
    </label>
    <label>backdrop
      <select id="backdrop">
        <option value="checker">checker</option>
        <option value="dark" selected>dark</option>
        <option value="light">light</option>
        <option value="none">none</option>
      </select>
    </label>
    <label><input id="animate" type="checkbox" checked> animate</label>
    <label>filter <input id="filter" type="search" placeholder="name…" size="14"></label>
    <button id="collapseAll" type="button">collapse all</button>
  </div>
  <nav id="nav"></nav>
</header>
<main id="root"></main>
<div id="err"></div>
<script>
window.addEventListener('error', function (e) {
  document.getElementById('err').textContent =
    'Gallery failed to boot:\n\n' + (e.error && e.error.stack || e.message);
});
</script>
<script>(() => {
  // src/engine/glfx.js
  var VS = `
attribute vec2 aP;
varying vec2 vUv;
void main() { vUv = aP * 0.5 + 0.5; gl_Position = vec4(aP, 0.0, 1.0); }`;
  var FS_BRIGHT = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uT;
void main() {
  vec3 c = texture2D(uT, vUv).rgb;
  float l = dot(c, vec3(0.299, 0.587, 0.114));
  gl_FragColor = vec4(c * smoothstep(0.8, 0.97, l), 1.0);
}`;
  var FS_BLUR = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uT;
uniform vec2 uDir;
void main() {
  vec3 c = texture2D(uT, vUv).rgb * 0.227;
  c += (texture2D(uT, vUv + uDir * 1.385).rgb + texture2D(uT, vUv - uDir * 1.385).rgb) * 0.316;
  c += (texture2D(uT, vUv + uDir * 3.231).rgb + texture2D(uT, vUv - uDir * 3.231).rgb) * 0.070;
  gl_FragColor = vec4(c, 1.0);
}`;
  var FS_FINAL = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uBack, uBloom, uOv;
uniform float uFx, uGlow, uSky, uTime;
uniform vec2 uShake;

float hash21(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float vnoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash21(i), b = hash21(i + vec2(1.0, 0.0));
  float c = hash21(i + vec2(0.0, 1.0)), d = hash21(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float fbm(vec2 p) {
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { s += a * vnoise(p); p = p * 2.03 + 7.1; a *= 0.5; }
  return s;
}

// One grid of stars: each cell may hold a star with its own color, phase and
// twinkle rate. Core + halo + a faint diffraction cross, so bright ones read
// as points of light rather than dots.
vec3 starGrid(vec2 uv, float scale, float seed, float t) {
  vec2 g = uv * scale + seed * 13.7;
  vec2 id = floor(g), f = fract(g) - 0.5;
  float h = hash21(id + seed);
  float present = step(0.74, h);
  vec2 off = (vec2(hash21(id + 3.13), hash21(id + 7.77)) - 0.5) * 0.66;
  vec2 dv = f - off;
  float d = length(dv);
  float tw = 0.30 + 0.70 * pow(0.5 + 0.5 * sin(t * (1.1 + 4.0 * fract(h * 17.0)) + h * 44.0), 2.0);
  float core = smoothstep(0.055, 0.004, d);
  float halo = smoothstep(0.34, 0.0, d);
  halo = halo * halo * halo;
  float mag = fract(h * 91.0);
  float spike = smoothstep(0.26, 0.0, abs(dv.x) * 9.0 + d * 1.4)
              + smoothstep(0.26, 0.0, abs(dv.y) * 9.0 + d * 1.4);
  vec3 tint = mix(vec3(0.70, 0.80, 1.0), vec3(1.0, 0.85, 0.60), mag);
  return present * tw * (core + halo * 0.34 + spike * 0.16 * step(0.72, mag)) * tint;
}

// The whole deep-space backdrop, generated on the GPU wherever the 2D layer
// left a hole: gradient, drifting nebula, three parallax star grids, and a
// shooting star that crosses every few seconds.
vec3 skyColor(vec2 uv, float t) {
  float sy = 1.0 - uv.y;                       // 0 at the top of the screen
  vec3 col = mix(vec3(0.027, 0.027, 0.059), vec3(0.078, 0.062, 0.149), smoothstep(0.0, 0.65, sy));
  col = mix(col, vec3(0.110, 0.078, 0.188), smoothstep(0.65, 1.0, sy));

  vec2 p = vec2(uv.x * 1.778, uv.y);           // square up the aspect
  float depth = smoothstep(0.85, 0.05, sy);    // everything fades toward the floor

  // nebula: two counter-drifting noise fields, tinted teal and violet
  float n1 = fbm(p * 3.1 + vec2(t * 0.012, t * 0.005));
  float n2 = fbm(p * 5.3 - vec2(t * 0.008, 0.0) + 21.0);
  float neb = smoothstep(0.45, 0.95, n1 * 0.65 + n2 * 0.45);
  col += neb * depth * mix(vec3(0.05, 0.16, 0.20), vec3(0.16, 0.05, 0.22), n2) * 0.85;

  // three parallax layers: far and faint, near and bright
  vec3 s = starGrid(p, 34.0, 0.0, t) * 0.40
         + starGrid(p + vec2(t * 0.004, 0.0), 22.0, 1.0, t) * 0.75
         + starGrid(p + vec2(t * 0.009, 0.0), 13.0, 2.0, t) * 1.15;
  col += s * depth;

  // shooting star: one streak per 6.5s window, only in the upper sky
  float cyc = floor(t / 6.5);
  float ph = fract(t / 6.5) * 6.5;
  float sh = hash21(vec2(cyc, 3.0));
  vec2 a = vec2(-0.15 + sh * 0.5, 0.12 + hash21(vec2(cyc, 9.0)) * 0.22);
  vec2 dir = normalize(vec2(1.0, 0.42));
  float travel = (ph - 0.4) * 1.5;
  vec2 head = a + dir * travel;
  vec2 rel = p - head;
  float along = dot(rel, -dir);
  float across = abs(dot(rel, vec2(-dir.y, dir.x)));
  float trail = smoothstep(0.22, 0.0, along) * step(0.0, along) * smoothstep(0.010, 0.0, across);
  trail += smoothstep(0.03, 0.0, length(rel)) * 1.6;
  float alive = step(0.0, travel) * step(travel, 1.6) * step(0.55, sh);
  col += trail * alive * depth * vec3(0.85, 0.92, 1.0);

  return col;
}

void main() {
  vec2 d = vUv - 0.5;
  float r = length(d);
  vec2 ab = d * 0.0022 * r * uFx;
  // aberration + bloom soften only the BACKGROUND; the full-resolution
  // overlay (heroes, banners) composites on top pin-sharp.
  vec2 buv = clamp(vUv - uShake, 0.0, 1.0);
  vec4 bsrc = texture2D(uBack, buv);
  vec3 bg;
  bg.r = texture2D(uBack, buv + ab).r;
  bg.g = bsrc.g;
  bg.b = texture2D(uBack, buv - ab).b;
  // Wherever the 2D layer left a hole (the title screen's sky), the GPU fills
  // it in procedurally. Backbuffer colors are premultiplied, so this slots in
  // underneath without any extra blending math.
  if (uSky > 0.5) bg += skyColor(vUv, uTime) * (1.0 - bsrc.a);
  vec3 bl = texture2D(uBloom, vUv).rgb;
  vec4 ov = texture2D(uOv, vUv);
  vec3 col = ov.rgb + (bg + bl * 0.45 * uFx * uGlow) * (1.0 - ov.a);
  float vig = 1.0 - smoothstep(0.55, 0.98, r) * (0.1 + 0.14 * uFx);
  gl_FragColor = vec4(col * vig, 1.0);
}`;
  function compile(gl, vsSrc, fsSrc) {
    const mk = (type, src) => {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh));
      return sh;
    };
    const p = gl.createProgram();
    gl.attachShader(p, mk(gl.VERTEX_SHADER, vsSrc));
    gl.attachShader(p, mk(gl.FRAGMENT_SHADER, fsSrc));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
    return p;
  }
  function makeTex(gl, w, h) {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    if (w) gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    return t;
  }
  function makeFbo(gl, w, h) {
    const tex = makeTex(gl, w, h);
    const fb = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return { fb, tex, w, h };
  }
  function destroyFbo(gl, target) {
    if (!target) return;
    if (target.fb) gl.deleteFramebuffer(target.fb);
    if (target.tex) gl.deleteTexture(target.tex);
  }
  var glfx = {
    gl: null,
    active: false,
    lastError: null,
    fx: 1,
    // GLOW FX setting: 1 on, 0 off
    glow: 0,
    // scene bloom gate: 1 only during live gameplay, 0 on menus/pause
    tierFx: 1,
    // adaptive-density gate: 0 suppresses bloom at low render density
    sky: 0,
    // procedural starfield gate: 1 on the title screen only
    time: 0,
    // sky animation clock (seconds); frozen when flashing is reduced
    setTierFx(on) {
      this.tierFx = on ? 1 : 0;
    },
    init(canvas2) {
      let gl = null;
      this.gl = null;
      this.active = false;
      this.ready = false;
      this.lastError = null;
      try {
        const attrs = { alpha: false, powerPreference: "high-performance" };
        gl = canvas2.getContext("webgl", attrs) || canvas2.getContext("experimental-webgl", attrs);
      } catch (error) {
        this.lastError = error;
        return { ok: false, claimed: false, error };
      }
      if (!gl) return { ok: false, claimed: false, error: null };
      try {
        this.gl = gl;
        this.pBright = compile(gl, VS, FS_BRIGHT);
        this.pBlur = compile(gl, VS, FS_BLUR);
        this.pFinal = compile(gl, VS, FS_FINAL);
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
        this.texBack = makeTex(gl);
        this.texOv = makeTex(gl);
        this.texOvBlank = makeTex(gl, 1, 1);
        this.active = true;
        return { ok: true, claimed: true, error: null };
      } catch (error) {
        this.lastError = error;
        this.gl = null;
        this.active = false;
        return { ok: false, claimed: true, error };
      }
    },
    resize(srcW, srcH) {
      const gl = this.gl;
      if (!gl) return;
      this.srcW = srcW;
      this.srcH = srcH;
      this.ready = true;
      if (this.textureW !== srcW || this.textureH !== srcH) {
        for (const tex of [this.texBack, this.texOv]) {
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, srcW, srcH, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
        }
        this.textureW = srcW;
        this.textureH = srcH;
      }
      const bw = Math.max(1, srcW >> 2), bh = Math.max(1, srcH >> 2);
      if (this.bloomA && this.bloomA.w === bw && this.bloomA.h === bh && this.bloomB && this.bloomB.w === bw && this.bloomB.h === bh) return;
      const nextA = makeFbo(gl, bw, bh);
      const nextB = makeFbo(gl, bw, bh);
      destroyFbo(gl, this.bloomA);
      destroyFbo(gl, this.bloomB);
      this.bloomA = nextA;
      this.bloomB = nextB;
    },
    draw(prog, setUniforms) {
      const gl = this.gl;
      gl.useProgram(prog);
      const loc = gl.getAttribLocation(prog, "aP");
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      setUniforms(gl, prog);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    },
    upload(tex, canvas2) {
      const gl = this.gl;
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
      gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, gl.RGBA, gl.UNSIGNED_BYTE, canvas2);
    },
    render(backCanvas, overlayCanvas, shakeX, shakeY) {
      const gl = this.gl;
      if (!gl || !this.ready) return;
      this.upload(this.texBack, backCanvas);
      const ovTex = overlayCanvas ? this.texOv : this.texOvBlank;
      if (overlayCanvas) this.upload(this.texOv, overlayCanvas);
      const bind = (unit, tex) => {
        gl.activeTexture(gl.TEXTURE0 + unit);
        gl.bindTexture(gl.TEXTURE_2D, tex);
      };
      if (this.fx > 0 && this.glow > 0 && this.tierFx > 0) {
        gl.bindFramebuffer(gl.FRAMEBUFFER, this.bloomA.fb);
        gl.viewport(0, 0, this.bloomA.w, this.bloomA.h);
        this.draw(this.pBright, (g, p) => {
          bind(0, this.texBack);
          g.uniform1i(g.getUniformLocation(p, "uT"), 0);
        });
        gl.bindFramebuffer(gl.FRAMEBUFFER, this.bloomB.fb);
        this.draw(this.pBlur, (g, p) => {
          bind(0, this.bloomA.tex);
          g.uniform1i(g.getUniformLocation(p, "uT"), 0);
          g.uniform2f(g.getUniformLocation(p, "uDir"), 1 / this.bloomA.w, 0);
        });
        gl.bindFramebuffer(gl.FRAMEBUFFER, this.bloomA.fb);
        this.draw(this.pBlur, (g, p) => {
          bind(0, this.bloomB.tex);
          g.uniform1i(g.getUniformLocation(p, "uT"), 0);
          g.uniform2f(g.getUniformLocation(p, "uDir"), 0, 1 / this.bloomB.h);
        });
      }
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
      this.draw(this.pFinal, (g, p) => {
        bind(0, this.texBack);
        bind(1, this.bloomA.tex);
        bind(2, ovTex);
        g.uniform1i(g.getUniformLocation(p, "uBack"), 0);
        g.uniform1i(g.getUniformLocation(p, "uBloom"), 1);
        g.uniform1i(g.getUniformLocation(p, "uOv"), 2);
        g.uniform1f(g.getUniformLocation(p, "uFx"), this.fx);
        g.uniform1f(g.getUniformLocation(p, "uGlow"), this.glow * this.tierFx);
        g.uniform1f(g.getUniformLocation(p, "uSky"), this.sky);
        g.uniform1f(g.getUniformLocation(p, "uTime"), this.time);
        g.uniform2f(g.getUniformLocation(p, "uShake"), shakeX / this.srcW, -shakeY / this.srcH);
      });
    }
  };

  // src/engine/renderer.js
  var W = 480;
  var H = 270;
  var canvas = typeof document !== "undefined" ? document.getElementById("game") : null;
  var chromeCanvas = typeof document !== "undefined" ? document.getElementById("chrome") : null;
  var chromeCtx = chromeCanvas ? chromeCanvas.getContext("2d", { desynchronized: true }) : null;
  var safeAreaEl = typeof document !== "undefined" ? document.getElementById("safe-area") : null;
  var CHROME_R_MIN = 32;
  var CHROME_PAD = 8;
  var CHROME_MIN_MARGIN = CHROME_R_MIN * 2 + CHROME_PAD;
  var back = (() => {
    const c = typeof document !== "undefined" ? document.createElement("canvas") : null;
    if (c) {
      c.width = W;
      c.height = H;
    }
    return c;
  })();

    const HEAD_ROWS = [
      ["60u", 60, null],
      ["60u \xB7wall", 60, WALL_BASE],
      ["24u", HERO_DRAW_H, null],
      ["24u \xB7wall", HERO_DRAW_H, WALL_BASE]
    ];
    const headCell = (ctx, id, h, cellX, cellY, phase, bg) => {
      const anchor = TOON_SPECS[id].heavy ? 0.978 : 0.76;
      ctx.save();
      ctx.beginPath();
      ctx.rect(cellX, cellY, CELL, CELL);
      ctx.clip();
      if (bg) {
        ctx.fillStyle = bg;
        ctx.fillRect(cellX, cellY, CELL, CELL);
      }
      ctx.translate(cellX + CELL / 2, cellY + CELL / 2);
      ctx.scale(CELL / (HEAD_SPAN * h), CELL / (HEAD_SPAN * h));
      drawToon(ctx, id, pose("run", phase), 0, anchor * h, h);
      ctx.restore();
    };
    const PHASE = 0.42;
    for (const id of IDS) {
      const cmpW = LABEL_W + TREATMENTS.length * CELL;
      const cmpH = 14 + HEAD_ROWS.length * CELL;
      tile(grid, `${id} \u2014 rim head to head`, "six treatments x two backdrops, frozen", cmpW, cmpH, (ctx) => {
        ctx.font = "bold 7px ui-monospace, monospace";
        ctx.fillStyle = "#8a8a9a";
        ctx.textBaseline = "alphabetic";
        TREATMENTS.forEach(([name], i) => {
          ctx.fillText(name, LABEL_W + i * CELL + 4, 9);
        });
        HEAD_ROWS.forEach(([rowLabel, h, bg], r) => {
          const y = 14 + r * CELL;
          ctx.fillStyle = "#8a8a9a";
          ctx.fillText(rowLabel, 4, y + CELL / 2);
          TREATMENTS.forEach(([, , rim], i) => {
            setRim(rim);
            try {
              headCell(ctx, id, h, LABEL_W + i * CELL, y, PHASE, bg);
            } finally {
              setRim();
            }
          });
        });
        ctx.strokeStyle = "rgba(255,255,255,0.07)";
        ctx.lineWidth = 0.4;
        ctx.beginPath();
        for (let i = 0; i <= TREATMENTS.length; i++) {
          ctx.moveTo(LABEL_W + i * CELL, 12);
          ctx.lineTo(LABEL_W + i * CELL, cmpH);
        }
        for (let r = 0; r <= HEAD_ROWS.length; r++) {
          ctx.moveTo(LABEL_W, 14 + r * CELL);
          ctx.lineTo(cmpW, 14 + r * CELL);
        }
        ctx.stroke();
      }, { wide: true, hires: 5 });
    }
    const POSE_W = 54, POSE_H = 78;
    for (const [name, note, rim] of TREATMENTS) {
      tile(grid, `full figure \u2014 ${name}`, note, POSE_W * IDS.length, POSE_H, (ctx, t) => {
        ctx.fillStyle = WALL_BASE;
        ctx.fillRect(0, 0, POSE_W * IDS.length, POSE_H);
        setRim(rim);
        try {
          IDS.forEach((id, i) => {
            drawToon(ctx, id, pose("run", t), POSE_W * i + POSE_W / 2, POSE_H - 3, 60);
          });
        } finally {
          setRim();
        }
      }, { animated: true, wide: true });
    }
  }
  {
    const grid = section(
      "brow-bakeoff",
      "Eyebrow weight bake-off",
      "One dial \u2014 `INK.brow` \u2014 on the eyebrow hairline alone, leaving the eye rings and mouths at their shipped thin-face weights. `current` is 0.01u, `was` the 0.018u the pass cut it from. Read the SIZE columns against each other, not just down: the brow is `max(BROW_MIN, BROW_W * u)`, and BROW_MIN (0.38) binds below u=38 \u2014 so at 60u the multiplier moves a proportional width, while at 34u and 24u it is scaling the FLOOR, and those two sites draw an identical brow despite being different sizes. That is why the thinning reads much harder in the menus and the cast parade than it does in a run. grumpos is `gruff`, gnash and raymn are `cocky`, the rest draw brows off `focus` while running; fernwick (`bright`) and b33p (robot LEDs) draw none and are not shown."
    );
    const TREATMENTS = [
      ["current", "shipped \u2014 lighten 0.30 at opacity 0.92", 1, 0.92, 0.3],
      ["full ink", "no lighten, fully opaque \u2014 the bar", 1, 1, 0],
      ["a-only .72", "opacity 0.72, no lighten \u2014 the first try, too dark", 1, 0.72, 0],
      ["a-only .58", "opacity 0.58, no lighten \u2014 too light AND translucent", 1, 0.58, 0],
      ["lighter", "lighten 0.42 at opacity 0.92 \u2014 a notch further", 1, 0.92, 0.42]
    ];
    const IDS = ["grumpos", "gary", "gnash", "raymn"];
    const BROW_T = 4;
    const CELL = 66, LABEL_W = 74;
    const SITES = [
      ["60u menu", (ctx, id, x, y) => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, CELL, CELL);
        ctx.clip();
        ctx.translate(x + CELL / 2, y + CELL / 2);
        ctx.scale(CELL / (0.62 * 60), CELL / (0.62 * 60));
        drawToon(ctx, id, pose("run", BROW_T), 0, (TOON_SPECS[id].heavy ? 0.978 : 0.76) * 60, 60);
        ctx.restore();
      }],
      ["34u HUD face", (ctx, id, x, y) => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, CELL, CELL);
        ctx.clip();
        ctx.translate(x, y);
        ctx.scale(CELL / 34, CELL / 34);
        drawToonFace(ctx, id, 0, 0, 34, 34);
        ctx.restore();
      }],
      ["24u in-run", (ctx, id, x, y) => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, CELL, CELL);
        ctx.clip();
        ctx.translate(x + CELL / 2, y + CELL / 2);
        ctx.scale(CELL / (0.62 * HERO_DRAW_H), CELL / (0.62 * HERO_DRAW_H));
        drawToon(ctx, id, pose("run", BROW_T), 0, (TOON_SPECS[id].heavy ? 0.978 : 0.76) * HERO_DRAW_H, HERO_DRAW_H);
        ctx.restore();
      }]
    ];
    for (const id of IDS) {
      const cmpW = LABEL_W + TREATMENTS.length * CELL;
      const cmpH = 14 + SITES.length * CELL;
      tile(grid, `${id} \u2014 brow weight`, "five weights x three real sites, frozen", cmpW, cmpH, (ctx) => {
        ctx.font = "bold 7px ui-monospace, monospace";
        ctx.fillStyle = "#8a8a9a";
        ctx.textBaseline = "alphabetic";
        TREATMENTS.forEach(([name], i) => ctx.fillText(name, LABEL_W + i * CELL + 4, 9));
        SITES.forEach(([siteLabel, paintCell], r) => {
          const y = 14 + r * CELL;
          ctx.fillStyle = "#8a8a9a";
          ctx.fillText(siteLabel, 4, y + CELL / 2);
          TREATMENTS.forEach(([, , brow, browA, browL], i) => {
            setInk({ brow, browA, browL });
            try {
              paintCell(ctx, id, LABEL_W + i * CELL, y);
            } finally {
              setInk();
            }
          });
        });
        ctx.strokeStyle = "rgba(255,255,255,0.07)";
        ctx.lineWidth = 0.4;
        ctx.beginPath();
        for (let i = 0; i <= TREATMENTS.length; i++) {
          ctx.moveTo(LABEL_W + i * CELL, 12);
          ctx.lineTo(LABEL_W + i * CELL, cmpH);
        }
        for (let r = 0; r <= SITES.length; r++) {
          ctx.moveTo(LABEL_W, 14 + r * CELL);
          ctx.lineTo(cmpW, 14 + r * CELL);
        }
        ctx.stroke();
      }, { wide: true, hires: 6 });
    }
  }
  {
    const grid = section(
      "lorenzo-pants",
      "Lorenzo \u2014 trouser colour bake-off",
      "Blue is shipped, and is also the most recognisable borrowed note left in the design: cap plus mustache plus blue trousers is a silhouette everyone already knows. Each row is one candidate on the hub wall (#241c30), a stage sky, and the gallery black, at the 60u gallery size and again at the real in-run 24u. Judge the 24u panels and the hub-wall column \u2014 a trouser colour that only works on a bright stage is not a trouser colour. See LORENZO_PANTS in toons.js; setLorenzoPants drives the real draw path, so nothing here is a mock-up."
    );
    const BACKS = [["hub wall", WALL_BASE], ["stage sky", "#8ed0f0"], ["gallery black", "#12121a"]];
    const HH = 74, PANEL = 96, PAD = 6;
    const TW = BACKS.length * PANEL;
    const TH = 116;
    for (const cand of LORENZO_PANTS) {
      tile(grid, cand.label, `${cand.hex} \u2014 ${cand.note}`, TW, TH, (ctx, t) => {
        setLorenzoPants(cand.hex);
        try {
          BACKS.forEach(([, bg], i) => {
            const x = i * PANEL;
            ctx.fillStyle = bg;
            ctx.fillRect(x, 0, PANEL - 2, TH);
            drawToon(ctx, "lorenzo", pose("run", t), x + PANEL * 0.3, TH - PAD, HH);
            ctx.save();
            ctx.translate(x + PANEL * 0.62, TH - PAD - 30);
            ctx.scale(2, 2);
            drawToon(ctx, "lorenzo", pose("run", t), 12, 15, HERO_DRAW_H);
            ctx.restore();
          });
        } finally {
          setLorenzoPants();
        }
      }, { animated: true, wide: true });
    }
  }
  var io = new IntersectionObserver((entries) => {
    for (const en of entries) {
      const t = tiles.find((x) => x.card === en.target);
      if (t) t.visible = en.isIntersecting;
    }
  }, { rootMargin: "200px" });
  for (const t of tiles) io.observe(t.card);
  for (const t of tiles) paint(t, 0);
  var start = performance.now();
  function frame(now) {
    const t = Math.max(0, (now - start) / 1e3);
    if (animate) {
      for (const e of tiles) if (e.animated && e.visible) paint(e, t);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  window.__gallery = {
    tiles,
    paint,
    drawToon,
    TOON_SPECS,
    HERO_DRAW_H,
    get errors() {
      return tiles.filter((t) => t.stack);
    }
  };
  for (const a of nav.querySelectorAll("a[data-target]")) {
    const sec = document.getElementById(a.dataset.target);
    const badge = document.createElement("span");
    badge.className = "nav-count";
    badge.textContent = sec ? sec.querySelectorAll(".card").length : 0;
    a.appendChild(badge);
  }
  var navSpy = new IntersectionObserver((entries) => {
    for (const en of entries) {
      if (!en.isIntersecting) continue;
      for (const a of nav.querySelectorAll("a[data-target]")) {
        a.classList.toggle("active", a.dataset.target === en.target.id);
      }
    }
  }, { rootMargin: "-96px 0px -70% 0px" });
  for (const s of root.querySelectorAll("section")) navSpy.observe(s);
  for (const h2 of root.querySelectorAll("section > h2")) {
    h2.addEventListener("click", () => h2.closest("section").classList.toggle("collapsed"));
  }
  var collapseAllEl = document.getElementById("collapseAll");
  collapseAllEl.addEventListener("click", () => {
    const sections = [...root.querySelectorAll("section")];
    const collapsing = !sections.every((s) => s.classList.contains("collapsed"));
    for (const s of sections) s.classList.toggle("collapsed", collapsing);
    collapseAllEl.textContent = collapsing ? "expand all" : "collapse all";
  });
  document.querySelector("h1 small").textContent = `dev build \xB7 click any tile to save a PNG \xB7 ${tiles.length} tiles across ${root.querySelectorAll("section").length} sections`;
  function applyZoom() {
    for (const t of tiles) {
      t.canvas.style.width = (t.fixed ? t.w : t.w * zoom) + "px";
      t.canvas.style.height = (t.fixed ? t.h : t.h * zoom) + "px";
    }
  }
  var zoomEl = document.getElementById("zoom");
  zoomEl.addEventListener("change", () => {
    zoom = +zoomEl.value;
    applyZoom();
  });
  var resolutionEl = document.getElementById("resolution");
  resolutionEl.addEventListener("change", () => {
    renderScale = +resolutionEl.value;
    resizeTiles();
  });
  function applyBackdrop(mode) {
    document.body.classList.remove("bg-checker", "bg-dark", "bg-light", "bg-none");
    document.body.classList.add("bg-" + mode);
  }
  var bdEl = document.getElementById("backdrop");
  bdEl.addEventListener("change", () => applyBackdrop(bdEl.value));
  var animEl = document.getElementById("animate");
  animEl.addEventListener("change", () => {
    animate = animEl.checked;
    if (!animate) return;
    start = performance.now();
  });
  var filterEl = document.getElementById("filter");
  filterEl.addEventListener("input", () => {
    const q = filterEl.value.trim().toLowerCase();
    document.body.classList.toggle("filtering", !!q);
    for (const t of tiles) t.card.style.display = !q || t.card.dataset.search.includes(q) ? "" : "none";
  });
  applyZoom();
  applyBackdrop(bdEl.value);
  for (const t of tiles) {
    if (t.w === W && t.h === H) {
      t.canvas.style.width = W + "px";
      t.canvas.style.height = H + "px";
      t.fixed = true;
    }
  }
})();
</script>
</body>
</html>
