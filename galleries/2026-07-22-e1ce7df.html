<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MASHENSTEIN — Asset Gallery</title>
<style>
  :root { --bg:#0b0b14; --panel:#15151f; --line:#2a2a3a; --ink:#e0e0e8; --dim:#8a8a9e; --accent:#f6d33c; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
               font:13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { position:sticky; top:0; z-index:10; background:rgba(11,11,20,0.94);
           backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 20px; }
  h1 { margin:0 0 8px; font-size:15px; letter-spacing:0.08em; color:var(--accent); }
  h1 small { color:var(--dim); font-weight:normal; letter-spacing:0; margin-left:10px; }
  .controls { display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .controls label { display:flex; gap:6px; align-items:center; color:var(--dim); cursor:pointer; }
  .controls input[type=range] { width:110px; }
  nav { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  nav a { color:var(--dim); text-decoration:none; padding:2px 8px; border:1px solid var(--line); border-radius:99px; }
  nav a:hover { color:var(--accent); border-color:var(--accent); }
  main { padding:20px; }
  section { margin-bottom:34px; }
  section > h2 { font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent);
                 border-bottom:1px solid var(--line); padding-bottom:6px; margin:0 0 4px; scroll-margin-top:120px; }
  section > p.note { color:var(--dim); margin:0 0 12px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:8px;
          display:flex; flex-direction:column; align-items:center; gap:6px; }
  .card canvas { display:block; image-rendering:pixelated; border-radius:3px; cursor:pointer; }
  .card .name { color:var(--dim); font-size:11px; text-align:center; max-width:100%; word-break:break-word; }
  .card .name b { color:var(--ink); font-weight:normal; }
  .card.wide { width:100%; }
  .card.err { border-color:#e04848; }
  .card.err .name { color:#e04848; }
  /* Swatch backdrops behind transparent art. */
  .bg-dark canvas   { background:#12121c; }
  .bg-light canvas  { background:#d8d8e4; }
  .bg-checker canvas{ background-color:#7a7a8a;
    background-image:linear-gradient(45deg,#5a5a6a 25%,transparent 25%,transparent 75%,#5a5a6a 75%),
                     linear-gradient(45deg,#5a5a6a 25%,transparent 25%,transparent 75%,#5a5a6a 75%);
    background-size:12px 12px; background-position:0 0, 6px 6px; }
  .bg-none canvas   { background:transparent; }
  #err { color:#e04848; white-space:pre-wrap; padding:20px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>MASHENSTEIN — ASSET GALLERY <small>dev build · click any tile to save a PNG</small></h1>
  <div class="controls">
    <label>zoom <input id="zoom" type="range" min="1" max="8" step="1" value="3"><span id="zoomv">3x</span></label>
    <label>render
      <select id="resolution">
        <option value="1">logical</option>
        <option value="3" selected>high-res 3x</option>
      </select>
    </label>
    <label>backdrop
      <select id="backdrop">
        <option value="checker">checker</option>
        <option value="dark" selected>dark</option>
        <option value="light">light</option>
        <option value="none">none</option>
      </select>
    </label>
    <label><input id="animate" type="checkbox" checked> animate</label>
    <label>filter <input id="filter" type="search" placeholder="name…" size="14"></label>
  </div>
  <nav id="nav"></nav>
</header>
<main id="root"></main>
<div id="err"></div>
<script>
window.addEventListener('error', function (e) {
  document.getElementById('err').textContent =
    'Gallery failed to boot:\n\n' + (e.error && e.error.stack || e.message);
});
</script>

          break;

          break;
        case "die":

          break;
        case "dash":

          this.osc("square", 620, 300, 0.09, 0.12, 0.01);

        ctx.drawImage(src, 0, 0);
        const g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, "rgba(255,166,77,0.35)");
        g.addColorStop(1, "rgba(120,40,120,0.3)");
        atop(ctx, g, w, h);
      }]
    ];
    for (const [fname, fn] of FILTERS) {
      for (const id of ids) {
        tile(grid, id, fname, TW, TH, (ctx, t) => {
          fn(ctx, heroSrc(id, t), TW, TH, t);
        }, { animated: true, hires: false });
      }
    }
  }
  {
    const names = Object.keys(PROP_PAINTERS);
    const grid = section(
      "props",
      "Props (vector painters)",
      `${names.length} entries in PROP_PAINTERS, drawn via drawProp(). Multi-frame props cycle.`
    );
    const sizeOf = (n2) => {
      const def = Object.values(OBSTACLES).find((d) => d.sprite === n2) || Object.values(PICKUPS).find((d) => d.sprite === n2);
      return def ? { w: def.w, h: def.h } : { w: 16, h: 16 };
    };
    for (const n2 of names) {
      const { w, h } = sizeOf(n2);
      const fh = Math.round(h * propTall(n2));
      const frames = propFrames(n2);
      tile(grid, n2, `${w}x${fh}${frames > 1 ? ` \xB7 ${frames}f` : ""}`, w + 8, fh + 8, (ctx, t) => {
        const f = frames > 1 ? Math.floor(t * 8) % frames : 0;
        drawProp(ctx, n2, 4, 4, w, fh, f);
      }, { animated: frames > 1 });
    }
  }
  {
    const keys = Object.keys(WORLD_SPRITES);
    const grid = section(
      "world",
      "World sprites (pixel grids)",
      `${keys.length} pixel-grid sprites from WORLD_SPRITES, built by buildAllSprites() and read back via getSprite().`
    );
    for (const k of [...keys, "zombieWalk"]) {
      const spr = getSprite(k);
      if (!spr) {
        tile(grid, k, "not in cache", 16, 16, () => {
        });
        continue;
      }
      tile(
        grid,
        k,
        `${spr.width}x${spr.height}`,
        spr.width + 4,
        spr.height + 4,
        (ctx) => ctx.drawImage(spr, 2, 2)
      );
    }
  }
  {
    const grid = section(
      "obstacles",
      "Obstacles (in-world)",
      "Real drawWorldEntity() path \u2014 shadow, bob, telegraphs and all. Styled with the pixel pack."
    );
    const style = getStylePack("pixel", {});
    for (const type of Object.keys(OBSTACLES)) {
      const def = OBSTACLES[type];
      const e = makeObstacle(type, 100);
      const sub = def.isGap ? `${def.w}x${def.h} \xB7 no art \u2014 cut by ground()` : `${def.w}x${def.h} \xB7 ${def.action}${def.breakable ? " \xB7 breakable" : ""}`;
      entityTile(grid, type, sub, e, style);
    }
  }
  {
    const grid = section("pickups", "Pickups (in-world)", "Real drawWorldEntity() path, pixel pack.");
    const style = getStylePack("pixel", {});
    for (const type of Object.keys(PICKUPS)) {
      const def = PICKUPS[type];
      const e = makePickup(type, 100);
      entityTile(grid, type, `${def.w}x${def.h}${def.power ? " \xB7 " + def.power : ""}`, e, style);
    }
  }
  {
    const grid = section(
      "style-matrix",
      "Style matrix",
      "The same crate through every style pack \u2014 decorate() is what differs."
    );
    for (const cab of CABINETS) {
      const style = getStylePack(cab.style, {});
      const e = makeObstacle("crate", 100);
      entityTile(grid, cab.style, cab.id, e, style);
    }
  }
  {
    const grid = section("effects", "Effects & HUD bits", "Glow/spark sprite factories and the plug row.");
    for (const [id, def] of Object.entries(POWER_DEFS)) {
      const g = glowSprite(def.color, 16);
      tile(grid, id, `glow \xB7 ${def.name}`, g.width, g.height, (ctx) => ctx.drawImage(g, 0, 0));
    }
    for (const [id, def] of Object.entries(POWER_DEFS)) {
      const s = sparkSprite(def.color);
      tile(grid, id, "spark", s.width + 8, s.height + 8, (ctx) => ctx.drawImage(s, 4, 4));
    }
    const size = 11;
    tile(
      grid,
      "plug row",
      `${PLUG_NAMES.join("/")} \u2014 banked/live/empty`,
      PLUG_ROW_W(size) + 8,
      size + 8,
      (ctx, t) => drawPlugRow(ctx, 4, 4, Math.floor(t) % 4, [false, true, false], size),
      { animated: true }
    );
    tile(grid, "plug icons", PLUG_ICONS.join(" \xB7 "), 16 * 3 + 8, 24, (ctx) => {
      PLUG_ICONS.forEach((n2, i) => drawProp(ctx, n2, 4 + i * 16, 4, 14, 14));
    });
  }
  var io = new IntersectionObserver((entries) => {
    for (const en of entries) {
      const t = tiles.find((x) => x.card === en.target);
      if (t) t.visible = en.isIntersecting;
    }
  }, { rootMargin: "200px" });
  for (const t of tiles) io.observe(t.card);
  for (const t of tiles) paint(t, 0);
  var start = performance.now();
  function frame(now) {
    const t = Math.max(0, (now - start) / 1e3);
    if (animate) {
      for (const e of tiles) if (e.animated && e.visible) paint(e, t);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  window.__gallery = {
    tiles,
    paint,
    drawToon,
    TOON_SPECS,
    HERO_DRAW_H,
    get errors() {
      return tiles.filter((t) => t.stack);
    }
  };
  function applyZoom() {
    document.getElementById("zoomv").textContent = zoom + "x";
    for (const t of tiles) {
      t.canvas.style.width = (t.fixed ? t.w : t.w * zoom) + "px";
      t.canvas.style.height = (t.fixed ? t.h : t.h * zoom) + "px";
    }
  }
  var zoomEl = document.getElementById("zoom");
  zoomEl.addEventListener("input", () => {
    zoom = +zoomEl.value;
    applyZoom();
  });
  var resolutionEl = document.getElementById("resolution");
  resolutionEl.addEventListener("change", () => {
    renderScale = +resolutionEl.value;
    resizeTiles();
  });
  function applyBackdrop(mode) {
    document.body.className = "bg-" + mode;
  }
  var bdEl = document.getElementById("backdrop");
  bdEl.addEventListener("change", () => applyBackdrop(bdEl.value));
  var animEl = document.getElementById("animate");
  animEl.addEventListener("change", () => {
    animate = animEl.checked;
    if (!animate) return;
    start = performance.now();
  });
  var filterEl = document.getElementById("filter");
  filterEl.addEventListener("input", () => {
    const q = filterEl.value.trim().toLowerCase();
    for (const t of tiles) t.card.style.display = !q || t.card.dataset.search.includes(q) ? "" : "none";
  });
  applyZoom();
  applyBackdrop(bdEl.value);
  for (const t of tiles) {
    if (t.w === W && t.h === H) {
      t.canvas.style.width = W + "px";
      t.canvas.style.height = H + "px";
      t.fixed = true;
    }
  }
})();
</script>
</body>
</html>
