      specFill(ctx, CHOMPO_PATHS.bowL, p.a);
      specFill(ctx, CHOMPO_PATHS.bowR, p.a);
      specFill(ctx, CHOMPO_PATHS.bowShade, p.aDark, 0.4);
      dot(ctx, 130, 45, 9, p.aDark);
      ctx.restore();
    });
    ctx.restore();
    ctx.restore();
  }
  function drawRayHead(ctx, id, p, pose2, u, ow, hx, hy, lod, run) {
    const hairFlop = Math.sin((pose2.time || 0) * (run ? 8 : 2.5)) * 0.025 * u;
    outlined(ctx, p.s, ow, (c) => c.arc(hx, hy, 0.17 * u, 0, Math.PI * 2));
    outlined(ctx, p.a, ow, (c) => {
      c.moveTo(hx - 0.17 * u, hy - 0.02 * u);
      c.quadraticCurveTo(hx - 0.31 * u, hy - 0.09 * u, hx - 0.28 * u, hy + 0.13 * u + hairFlop);
      c.quadraticCurveTo(hx - 0.21 * u, hy + 0.03 * u + hairFlop, hx - 0.09 * u, hy - 0.34 * u);
      c.quadraticCurveTo(hx - 0.05 * u, hy - 0.38 * u, hx - 0.015 * u, hy - 0.17 * u);
      c.quadraticCurveTo(hx + 0.08 * u, hy - 0.31 * u, hx + 0.21 * u, hy - 0.29 * u);
      c.quadraticCurveTo(hx + 0.23 * u, hy - 0.23 * u, hx + 0.14 * u, hy - 0.16 * u);
      c.quadraticCurveTo(hx + 0.23 * u, hy - 0.1 * u, hx + 0.19 * u, hy - 0.025 * u + hairFlop * 0.3);
      c.quadraticCurveTo(hx + 0.02 * u, hy - 0.15 * u, hx - 0.18 * u, hy - 0.07 * u);
      c.closePath();
    });
    const ex = expressionFor(id, pose2);
    const faceYaw = Math.sin(Math.max(-65, Math.min(65, Number(pose2.headTurn) || 0)) * Math.PI / 180);
    const faceX = hx + (0.02 + faceYaw * 0.11) * u;
    ctx.save();
    ctx.translate(faceX, 0);
    ctx.scale(1 - Math.abs(faceYaw) * 0.16, 1);
    ctx.translate(-faceX, 0);
    drawEyes(ctx, p, u, faceX, hy - 0.01 * u, lod, ex);
    if (!lod) drawMouth(ctx, { mouth: "smirk" }, p, u, faceX, hy + 0.08 * u, ow, ex);
    ctx.restore();
  }
  function drawRay(ctx, id, p, pose2, u, ow, lod) {
    const ph = (pose2.phase || 0) * Math.PI * 2;
    const run = pose2.kind === "run";
    const duck = pose2.kind === "duck";
    const enhancedMotion = usesEnhancedLocomotion(pose2);
    const jump = pose2.kind === "jump" && enhancedMotion;
    const airV = jump ? Math.max(-1, Math.min(1, (Number(pose2.vy) || 0) / 460)) : 0;
    const airApex = jump ? 1 - Math.abs(airV) : 0;
    const footF = run ? floatingFoot(pose2.phase || 0, 0.115 * u, 0.082 * u) : [0, 0];
    const footB = run ? floatingFoot((pose2.phase || 0) + 0.5, 0.115 * u, 0.082 * u) : [0, 0];
    const bob = run ? -Math.abs(Math.sin(ph)) * 0.028 * u : 0;
    const cy = (duck ? -0.3 : -0.5) * u + bob - airApex * 0.03 * u;
    const handSwing = run ? Math.cos(ph) * 0.075 * u : jump ? 0.055 * u : 0;
    const handLift = run ? Math.sin(ph) * 0.035 * u : jump ? (0.045 + 0.035 * airApex) * u : 0;
    const shoeSpread = duck && enhancedMotion ? 0.165 : 0.13;
    const shoeLift = jump ? (0.09 + 0.07 * airApex) * u : 0;
    const backShoeX = -shoeSpread * u + footB[0], backShoeY = -0.04 * u + footB[1] - shoeLift;
    const frontShoeX = shoeSpread * u + footF[0], frontShoeY = -0.04 * u + footF[1] - shoeLift;
    const backTilt = -0.08 - (run ? Math.sin(ph) * 0.1 : 0);
    const frontTilt = 0.08 + (run ? Math.sin(ph) * 0.1 : 0);
    outlined(ctx, p.w, Math.max(0.5, ow * 0.55), (c) => c.ellipse(backShoeX - 0.015 * u, backShoeY - 0.04 * u, 0.07 * u, 0.04 * u, backTilt, 0, Math.PI * 2));
    outlined(ctx, p.f, ow, (c) => c.ellipse(backShoeX, backShoeY, 0.125 * u, 0.063 * u, backTilt, 0, Math.PI * 2));
    outlined(ctx, p.w, Math.max(0.5, ow * 0.55), (c) => c.ellipse(frontShoeX - 0.015 * u, frontShoeY - 0.04 * u, 0.07 * u, 0.04 * u, frontTilt, 0, Math.PI * 2));
    outlined(ctx, p.f, ow, (c) => c.ellipse(frontShoeX, frontShoeY, 0.125 * u, 0.063 * u, frontTilt, 0, Math.PI * 2));
    outlined(ctx, p.b, ow, (c) => roundRectPath(c, -0.165 * u, cy - 0.2 * u, 0.33 * u, 0.4 * u, 0.09 * u));
    outlined(ctx, p.m, ow, (c) => roundRectPath(c, -0.195 * u, cy - 0.225 * u, 0.39 * u, 0.07 * u, 0.03 * u));
    const scarfLag = run ? Math.sin(ph + 0.7) * 0.035 * u : 0;
    ctx.fillStyle = p.m;
    ctx.beginPath();
    ctx.moveTo(-0.14 * u, cy - 0.245 * u);
    ctx.quadraticCurveTo(-0.3 * u, cy - 0.225 * u + scarfLag, -0.37 * u, cy - 0.17 * u + scarfLag);
    ctx.lineTo(-0.14 * u, cy - 0.14 * u);
    ctx.fill();
    drawRayHead(ctx, id, p, pose2, u, ow, 0, cy - 0.35 * u, lod, run);
    const handY = cy + (duck && enhancedMotion ? 0.085 : jump ? -0.11 : 0.02) * u;
    const handOut = duck && enhancedMotion ? 0.34 : 0.29;
    const cheer = pose2.kind === "celebrate";
    const gloveStudy = cheer && usesReworkedCelebration(pose2);
    if (gloveStudy) {
      const gm = celebrateMotion(id, pose2.time || 0, true);
      const smooth = (v) => {
        const n = Math.max(0, Math.min(1, v));
        return n * n * (3 - 2 * n);
      };
      const blend = (a, b, v) => a.map((n, i) => n + (b[i] - n) * v);
      const restL = [-0.29 * u, cy - 0.24 * u, -0.12];
      const restR = [0.29 * u, cy - 0.24 * u, 0.12];
      const meetL = [-0.095 * u, cy - 0.69 * u, 0.48];
      const meetR = [0.095 * u, cy - 0.69 * u, -0.48];
      const finishL = [-0.27 * u, cy - 0.63 * u, -0.12];
      const finishR = [0.3 * u, cy - 0.18 * u, 0.12];
      const c = gm.cycle;
      let left, right;
      if (c < 0.18) {
        const v = smooth(c / 0.18);
        left = blend(restL, meetL, v);
        right = blend(restR, meetR, v);
      } else if (c < 0.36) {
        left = meetL;
        right = meetR;
      } else if (c < 0.5) {
        const v = smooth((c - 0.36) / 0.14);
        left = blend(meetL, finishL, v);
        right = blend(meetR, finishR, v);
      } else if (c < 0.82) {
        left = finishL;
        right = finishR;
      } else {
        const v = smooth((c - 0.82) / 0.18);
        left = blend(finishL, restL, v);
        right = blend(finishR, restR, v);
      }
      outlined(ctx, p.w, ow, (path) => path.ellipse(left[0], left[1], 0.105 * u, 0.095 * u, left[2], 0, Math.PI * 2));
      outlined(ctx, p.w, ow, (path) => path.ellipse(right[0], right[1], 0.105 * u, 0.095 * u, right[2], 0, Math.PI * 2));
      const impact = Math.max(0, 1 - Math.abs(c - 0.27) / 0.09);
      if (impact > 0 && !lod) {
        const iy = cy - 0.69 * u;
        ctx.save();
        ctx.globalAlpha *= impact;
        ctx.strokeStyle = "#f6d33c";
        ctx.lineWidth = Math.max(0.6, ow * 0.8);
        ctx.beginPath();
        for (const a of [-Math.PI / 2, -0.35, Math.PI + 0.35]) {
          ctx.moveTo(Math.cos(a) * 0.03 * u, iy + Math.sin(a) * 0.03 * u);
          ctx.lineTo(Math.cos(a) * 0.1 * u, iy + Math.sin(a) * 0.1 * u);
        }
        ctx.stroke();
        ctx.restore();
      }
    } else {
      const backHandY = cheer ? cy - 0.5 * u : handY + handLift;
      outlined(ctx, p.w, ow, (c) => c.ellipse(-handOut * u - handSwing, backHandY, 0.105 * u, 0.095 * u, -0.12, 0, Math.PI * 2));
      if (cheer) {
        const waveX = Math.sin((pose2.time || 0) * 8) * 0.1 * u;
        outlined(ctx, p.w, ow, (c) => c.ellipse(0.28 * u + waveX, cy - 0.62 * u, 0.105 * u, 0.095 * u, 0.12, 0, Math.PI * 2));
      } else if (!pose2.headless) outlined(ctx, p.w, ow, (c) => c.ellipse(handOut * u + handSwing, handY - handLift, 0.105 * u, 0.095 * u, 0.12, 0, Math.PI * 2));
      else if (pose2.menu) {
        const orbit = (pose2.time || 0) * 8;
        outlined(ctx, p.w, ow, (c) => c.arc(0.5 * u + Math.sin(orbit) * 0.08 * u, handY - 0.16 * u - Math.abs(Math.cos(orbit)) * 0.08 * u, 0.105 * u, 0, Math.PI * 2));
      }
    }
  }
  function drawToon(ctx, heroId, pose2 = {}, cx, feetY, h, opts = {}) {
    const spec = TOON_SPECS[heroId];
    if (!spec) return;
    const p = pal(heroId);
    const u = h;
    const ow = Math.max(0.3, 0.016 * h) * INK.body;
    const lod = h < 16;
    let sx = 1, sy = 1;
    if (!pose2.grounded && pose2.kind === "jump") {
      if (usesEnhancedLocomotion(pose2) && !pose2.stomp) {
        const speed = Math.min(1, Math.abs(Number(pose2.vy) || 0) / 520);
        sy = 1 + 0.095 * speed;
        sx = 1 - 0.052 * speed;
      } else {
        const st = pose2.stomp ? 0.25 : Math.min(0.18, Math.abs(pose2.vy || 0) / 700);
        sy = 1 + st;
        sx = 1 - 0.6 * st;
      }
    }
    if (pose2.kind === "duck" && usesEnhancedLocomotion(pose2) && !pose2.roll) {
      const raw = pose2.duckAmount == null ? 1 : Math.max(0, Math.min(1, Number(pose2.duckAmount) || 0));
      let crouch = raw * raw * (3 - 2 * raw);
      if (pose2.duckDirection > 0 && raw > 0.68 && raw < 1) {
        crouch += Math.sin((raw - 0.68) / 0.32 * Math.PI) * 0.055;
      }
      const startTall = spec.rig === "disc" ? 1.28 : spec.rig === "pika" || spec.rig === "blob" ? 1.45 : spec.rig === "ray" ? 1.25 : 1.7;
      sy *= startTall + (1 - startTall) * crouch;
      sx *= 0.9 + 0.1 * crouch;
    }
    const q = pose2.squash || 0;
    if (q > 0) {
      sy *= 1 - 0.28 * q;
      sx *= 1 + 0.32 * q;
    }
    ctx.save();
    if (opts.alpha != null) ctx.globalAlpha = opts.alpha;
    ctx.translate(cx, feetY);
    const cm = pose2.kind === "celebrate" ? celebrateMotion(heroId, pose2.time || 0, usesReworkedCelebration(pose2)) : null;
    if (cm) ctx.translate(cm.x * u, -cm.lift * u);
    if (pose2.facing === -1) ctx.scale(-1, 1);
    if (spec.figureScaleX || spec.figureScaleY) {
      ctx.scale(spec.figureScaleX || 1, spec.figureScaleY || 1);
    }
    if (pose2.lean) ctx.rotate(pose2.lean);
    if (cm) {
      if (cm.tilt) ctx.rotate(cm.tilt);
      if (cm.spin !== 1) sx *= (cm.spin < 0 ? -1 : 1) * Math.max(0.12, Math.abs(cm.spin));
      if (cm.squash) {
        sy *= 1 - 0.24 * cm.squash;
        sx *= 1 + 0.2 * cm.squash;
      }
    }
    ctx.scale(sx, sy);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    const xSign = (pose2.facing === -1 ? -1 : 1) * (sx < 0 ? -1 : 1);
    const prevLight = armLight(u, xSign, !lod && opts.light !== false, opts.lit == null ? 1 : opts.lit);
    if (spec.rig === "pika") drawPika(ctx, heroId, p, pose2, u, ow, lod);
    else if (spec.rig === "blob") drawBlob(ctx, heroId, p, pose2, u, ow, lod);
    else if (spec.rig === "disc") drawDisc(ctx, heroId, p, pose2, u, ow, lod);
    else if (spec.rig === "ray") drawRay(ctx, heroId, p, pose2, u, ow, lod);
    else drawHumanoid(ctx, heroId, spec, p, pose2, u, ow, lod);
    disarmLight(prevLight);
    ctx.restore();
  }
  var TOP_R = 64;
  var TOP_FEET = TOP_R * 2.75;

  // scratchpad/fern-cel-entry.js
  var CYCLE = 2.6;
  var SEED = { lorenzo: 0.2, gnash: 1.1, fernwick: 2.4, b33p: 3.2, mochi: 4.1, chompo: 5.3, gary: 0.8, raymn: 2.9, grumpos: 4.7, dolores: 1.7 };
  var root = document.getElementById("root");
  function pose(kind, t, extra = {}) {
    return {
      kind,
      phase: t * 1.6 % 1,
      time: t,
      vy: 0,
      grounded: true,
      squash: 0,
      lean: 0,
      roll: false,
      float: false,
      stomp: false,
      headless: false,
      facing: 1,
      ...extra
    };
  }
  function strip(title, note, id, extra = {}, opts = {}) {
    const N = opts.n || 8;
    const HH = opts.hh || 220;
    const off = (SEED[id] || 0) * 0.4;
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>${title}</h2><p class="note">${note}</p>`;
    const row = document.createElement("div");
    row.className = "row";
    sec.appendChild(row);
    root.appendChild(sec);
    const from = opts.from == null ? 0 : opts.from;
    const to = opts.to == null ? 1 : opts.to;
    for (let i = 0; i < N; i++) {
      const c = from + (to - from) * (i / N);
      const t = c * CYCLE - off + CYCLE * 4;
      const card = document.createElement("div");
      card.className = "card";
      const cv = document.createElement("canvas");
      const w = Math.round(HH * 1.25), h = Math.round(HH * 1.75);
      cv.width = w;
      cv.height = h;
      const cap = document.createElement("div");
      cap.className = "cap";
      cap.textContent = `${c.toFixed(2)}${c < 0.6 ? " sig" : " BIG"}`;
      card.append(cv, cap);
      row.appendChild(card);
      const ctx = cv.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      try {
        drawToon(ctx, id, pose("celebrate", t, { menu: true, ...extra }), w / 2, h - HH * 0.06, HH);
      } catch (e) {
        console.error(e);
      }
    }
  }
  var which = new URLSearchParams(location.search).get("who") || "both";
  if (which === "gnash" || which === "both") {

  }
  if (which === "fernwick" || which === "both") {
    strip("Fernwick \u2014 signature half (0.00\u20130.56)", "Champion's clasp.", "fernwick", {}, { from: 0, to: 0.56, n: 8 });
    strip("Fernwick \u2014 big move half (0.60\u20131.00)", "present.", "fernwick", {}, { from: 0.6, to: 1, n: 8 });
  }
  if (which === "cast" || which === "legacy") {
    const style = which === "legacy" ? { celebrateStyle: "legacy" } : {};
    for (const id of ["lorenzo", "gnash", "fernwick", "b33p", "mochi", "chompo", "gary", "raymn", "grumpos", "dolores"]) {
      strip(`${id} \u2014 celebrate (${which})`, "", id, style, { n: 8, hh: 120 });
    }
  }
  if (which === "zoom") {
    strip("Fernwick \u2014 present, zoomed", "Four frames through the hold.", "fernwick", {}, { from: 0.7, to: 0.98, n: 4, hh: 460 });
  }
})();
