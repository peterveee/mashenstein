<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MASHENSTEIN: The Unpluggening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@400..600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0b14; overflow: hidden; }
  body { touch-action: none; -webkit-user-select: none; user-select: none;
         -webkit-touch-callout: none; overscroll-behavior: none; }
  #game { position: fixed; image-rendering: auto; }
  #boot-error { position: absolute; inset: 0; color: #e0e0e8; font: 14px monospace;
                padding: 2em; display: none; white-space: pre-wrap; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="boot-error"></div>
<script>
window.addEventListener('error', function (e) {
  var el = document.getElementById('boot-error');
  if (el && !window.__mash_booted) {
    el.style.display = 'block';
    el.textContent = 'MASHENSTEIN failed to boot (the arcade remains unplugged):\n\n' + (e.message || e.error);
  }
});
</script>
<script>(() => {
  // src/engine/glfx.js

attribute vec2 aP;
varying vec2 vUv;
void main() { vUv = aP * 0.5 + 0.5; gl_Position = vec4(aP, 0.0, 1.0); }`;
  var FS_BRIGHT = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uT;
void main() {

  float l = dot(c, vec3(0.299, 0.587, 0.114));
  gl_FragColor = vec4(c * smoothstep(0.8, 0.97, l), 1.0);

  var FS_BLUR = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uT;

  c += (texture2D(uT, vUv + uDir * 1.385).rgb + texture2D(uT, vUv - uDir * 1.385).rgb) * 0.316;

precision mediump float;

// twinkle rate. Core + halo + a faint diffraction cross, so bright ones read
// as points of light rather than dots.
vec3 starGrid(vec2 uv, float scale, float seed, float t) {
  vec2 g = uv * scale + seed * 13.7;
  vec2 id = floor(g), f = fract(g) - 0.5;
  float h = hash21(id + seed);

          [330, 262, 220, 165].forEach((f, i) => this.osc("triangle", f, f, 0.14, 0.18, i * 0.15));
          break;
        case "dash":
          this.noise(0.3, 0.18, "bandpass", 1800);
          break;
        case "shoot":
          this.osc("square", 900, 500, 0.08, 0.14);
          break;
        case "axe":
          this.noise(0.25, 0.12, "bandpass", 900);
          this.osc("square", 300, 500, 0.2, 0.08);
          break;
        case "crunch":
          this.noise(0.1, 0.22, "lowpass", 600);
          this.osc("sine", 150, 60, 0.12, 0.2);
          break;
        // The chunks landing, a beat after the thing came apart. Deliberately a
        // separate cue from the break itself: it starts ~0.1s late (roughly the
        // shards' flight time) and thins out, so a break reads as impact-then-
        // scatter instead of one flat noise burst. Material picks the timbre.
        case "debris": {
          const m = DEBRIS_MATS[opt.mat] || DEBRIS_MATS.wood;
          for (let i = 0; i < m.ticks; i++) {
            const when = 0.1 + i * 0.062 + i % 2 * 0.021;
            this.noise(m.dur, m.gain * (1 - i * 0.22), m.type, m.freq * (1 - i * 0.12), when);
          }
          if (m.ping) m.ping.forEach((f, i) => this.osc("triangle", f, f * 0.94, 0.07, 0.035, 0.12 + i * 0.08));
          break;
        }
        // A ?-box giving way overhead: a hard ceramic crack on top of a gut
        // thump, then splinters raining down. 'crunch' was too polite for a hit
        // you are meant to go out of your way to land.
        case "blockBreak":
          this.noise(0.05, 0.34, "highpass", 3200);
          this.noise(0.22, 0.26, "bandpass", 950);
          this.osc("sine", 190, 45, 0.2, 0.32);
          this.osc("square", 620, 300, 0.09, 0.12, 0.01);
          [0.07, 0.13, 0.19].forEach((d, i) => this.noise(0.05, 0.11 - i * 0.03, "bandpass", 2400 - i * 500, d));
          break;
        // Coins spilling out of it: one blip per coin, staggered and climbing,
        // with a shimmer over the top so a big payout sounds like a big payout.
        case "coinSpray": {
          const nCoins = Math.max(1, Math.min(10, opt.count || 3));
          for (let i = 0; i < nCoins; i++) {
            const p = Math.pow(1.07, i);
            const when = 0.045 + i * 0.055;
            const g = 0.13 - i * 6e-3;
            this.osc("square", 988 * p, 988 * p, 0.05, g, when);
            this.osc("square", 1319 * p, 1319 * p, 0.07, g, when + 0.045);
          }
          this.noise(0.3, 0.06, "highpass", 6500, 0.05);
          break;
        }
        case "tag":
          this.osc("sine", 500, 1e3, 0.12, 0.16);
          this.osc("sine", 750, 1500, 0.12, 0.1, 0.03);
          break;
        case "perfect":
          [660, 880, 1320].forEach((f, i) => this.osc("sine", f, f, 0.08, 0.14, i * 0.05));
          break;
        case "ui":
          this.osc("sine", 1200, 1200, 0.05, 0.1);
          break;
        case "uiConfirm":
          this.osc("sine", 900, 900, 0.05, 0.1);
          this.osc("sine", 1350, 1350, 0.06, 0.1, 0.05);
          break;
        case "uiBad":
          this.osc("square", 200, 150, 0.15, 0.12);
          break;
        // One bite per coin, exactly like eating dots; combos ride the pitch up.
        case "waka":
          this.waka(0, pitch, 0.13, 0.4);
          break;
        // The hazard bite gets the full waka-waka plus something giving way.
        case "chomp":
          this.waka(0, 0.92, 0.15);
          this.waka(0.135, 0.84, 0.15);
          this.noise(0.06, 0.1, "lowpass", 520, 0.25);
          break;
        case "win":
          [523, 659, 784, 1047, 1319].forEach((f, i) => this.osc("square", f, f, 0.11, 0.14, i * 0.09));
          break;
        case "lose":
          [400, 350, 300, 200].forEach((f, i) => this.osc("sawtooth", f, f * 0.9, 0.16, 0.12, i * 0.12));
          break;
        case "checkpoint":
          this.osc("triangle", 700, 1400, 0.15, 0.14);
          break;
        case "boom":
          this.noise(0.5, 0.3, "lowpass", 300);
          this.osc("sine", 100, 30, 0.5, 0.3);
          break;
        // ---- Fireworks. Three burst shapes so a long results screen never
        // repeats the same crack twice in a row; the caller also detunes each.
        // The mortar going up: air, not tone. Rising sine underneath it only to
        // give the ear something to track to the top of the arc.
        case "fizzUp":
          this.noise(0.3, 0.09, "bandpass", 1500);
          this.osc("sine", 260 * pitch, 880 * pitch, 0.3, 0.045);
          break;
        case "popSmall":
          this.noise(0.09, 0.22, "highpass", 2200);
          this.osc("triangle", 820 * pitch, 190 * pitch, 0.1, 0.09);
          break;
        case "popBig":
          this.noise(0.32, 0.24, "lowpass", 760);
          this.osc("sine", 190 * pitch, 48 * pitch, 0.3, 0.15);
          break;
        // The one with a tail: a crack, then glitter falling out of it.
        case "crackle":
          this.noise(0.08, 0.2, "highpass", 1800);
          for (let i = 1; i < 6; i++) this.noise(0.04, 0.1, "highpass", 3200, 0.05 + i * 0.055);
          break;
        case "plop":
          this.osc("sine", 300, 120, 0.15, 0.2);
          break;
        case "type":
          this.osc("square", 800, 800, 0.02, 0.05);
          break;
        case "comet":
          this.cometSwoop();
          break;
        case "neonBuzz":
          this.neonBuzz();
          break;
      }
    }
    // ---- Music sequencer ------------------------------------------------------
    // Bank: {bpm, bass:[...], lead:[...], hats:[...], kick:[...], snare:[...],
    // clap:[...]} arrays of 32 steps (2 bars of 16ths); melodic values are
    // frequency or null, percussion is boolean. Loops with A/B lead.
    setBank(bank) {
      this.bank = bank;
      this.step = 0;
      if (bank && bank.bpm) {
        this.bpm = bank.bpm;
        if (this.delay) this.delay.delayTime.value = Math.min(0.9, 60 / bank.bpm * 0.75);
      }
    }
    // Tempo and pitch warp independently: slow-mo drags the tempo without
    // dropping the key, invincibility winds both up a whole tone.
    setWarp(tempo, pitch = tempo) {
      this.tempo = tempo;
      this.detune = pitch;
    }
    setDetune(d) {
      this.setWarp(d, d);
    }
    // Invincibility: duck the theme and bring up the star arpeggio over it, so
    // it still reads as the same song — just electrified.
    setInvincible(on) {
      on = !!on;
      if (on === this.starMode) return;
      this.starMode = on;
      if (!this.ctx) return;
      const t = this.ctx.currentTime;
      this.musicBus.gain.setTargetAtTime(on ? 0.32 : 1, t, 0.08);
      this.starBus.gain.setTargetAtTime(on ? 1.5 : 0, t, 0.08);
    }
    onBeat(fn) {
      this.beatListeners.push(fn);
    }
    startSequencer() {
      if (this.timer) return;
      this.nextTime = this.ctx.currentTime + 0.1;
      this.timer = setInterval(() => this.schedule(), 25);
    }
    schedule() {
      if (!this.ctx || !this.bank) return;
      const spb = 60 / (this.bpm * this.tempo) / 4;
      while (this.nextTime < this.ctx.currentTime + 0.12) {
        const s = this.step % 32;
        let b = this.bank;
        if (b.sections && b.sections.length) {
          const order = b.order || b.sections.map((_, i) => i);
          const sec = b.sections[order[Math.floor(this.step / 32) % order.length] % b.sections.length];
          if (sec) b = { ...this.bank, ...sec };
        }
        const play = (freq, type, dur, gain, attack = 0.01, echo = true, delay = 0) => {
          if (freq == null) return;
          const t = this.nextTime + delay;
          const o = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          o.type = type;
          o.frequency.setValueAtTime(freq * this.detune, t);
          g.gain.setValueAtTime(1e-4, t);
          g.gain.exponentialRampToValueAtTime(gain, t + Math.min(attack, dur * 0.45));
          g.gain.exponentialRampToValueAtTime(1e-4, t + dur);
          o.connect(g);
          g.connect(this.musicBus);
          if (echo) g.connect(this.echoBus);
          o.start(t);
          o.stop(t + dur + 0.02);
        };
        if (this.echoSend) this.echoSend.gain.setTargetAtTime(b.echoLevel != null ? b.echoLevel : 0.28, this.nextTime, 0.08);
        if (b.bass) {
          const bassDur = spb * (b.bassDur || 1.8);
          const bassGain = b.bassGain ?? 0.1;
          const bassEcho = !!b.bassEcho || !!b.echoEverything;
          play(b.bass[s], b.bassType || "square", bassDur, bassGain, b.bassAttack || 0.01, bassEcho);
          if (b.bassRepeat) {
            play(
              b.bass[s],
              b.bassType || "square",
              bassDur * (b.bassRepeatDur ?? 0.8),
              bassGain * (b.bassRepeatGain ?? 0.4),
              b.bassAttack || 0.01,
              false,
              spb * b.bassRepeat
            );
          }
          if (b.bass[s] != null) this.starRoot = b.bass[s];
        }
        if (b.lead) play(b.lead[s], b.leadType || "square", spb * (b.leadDur || 1.2), b.leadGain ?? 0.06, b.leadAttack || 0.01);
        if (b.leadHarm) play(b.leadHarm[s], b.harmType || b.leadType || "square", spb * (b.harmDur || b.leadDur || 1.2), b.harmGain ?? 0.04, b.harmAttack || b.leadAttack || 0.01);
        if (b.twinkle && b.twinkle[s]) {
          play(b.twinkle[s], "sine", spb * (b.twinkleDur || 6), b.twinkleGain ?? 0.014, b.twinkleAttack || 0.035);
          play(b.twinkle[s] * 2, "sine", spb * (b.twinkleDur || 6) * 0.65, (b.twinkleGain ?? 0.014) * 0.28, 0.02);
        }
        if (b.sweeps && b.sweeps[s] && this.noiseBuf) {

          const dur = spb * (b.sweepDur || 10);
          const src = this.ctx.createBufferSource();
          src.buffer = this.noiseBuf;
          src.loop = true;
          const band = this.ctx.createBiquadFilter();
          band.type = "bandpass";
          band.Q.value = 1.45;
          band.frequency.setValueAtTime(340, t);
          band.frequency.exponentialRampToValueAtTime(1350, t + dur * 0.55);
          band.frequency.exponentialRampToValueAtTime(460, t + dur);
          const low = this.ctx.createBiquadFilter();
          low.type = "lowpass";
          low.frequency.value = 1800;
          low.Q.value = 0.5;
          const g = this.ctx.createGain();
          const gain = b.sweepGain ?? 0.013;
          g.gain.setValueAtTime(1e-4, t);
          g.gain.exponentialRampToValueAtTime(gain, t + dur * 0.32);
          g.gain.exponentialRampToValueAtTime(1e-4, t + dur);

          band.connect(low);
          low.connect(g);

          src.stop(t + dur + 0.03);

          const steps = [-12, -10, -9, -7, -5, -4, -2, 0];
          const dt = spb * 3 / steps.length;
          const gv = b.keyGlissGain != null ? b.keyGlissGain : 0.035;
          steps.forEach((semi, i) => {
            const t = this.nextTime + i * dt;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.type = b.leadType || "square";
            o.frequency.setValueAtTime(fT * Math.pow(2, semi / 12), t);
            g.gain.setValueAtTime(1e-4, t);
            g.gain.exponentialRampToValueAtTime(gv * (0.6 + 0.4 * ((i + 1) / steps.length)), t + 6e-3);
            g.gain.exponentialRampToValueAtTime(1e-4, t + dt * 1.7);
            o.connect(g);
            g.connect(this.musicBus);
            o.start(t);
            o.stop(t + dt * 1.7 + 0.02);
          });
        }
        if (b.gliss && b.gliss[s]) {
          const t = this.nextTime;
          const fT = b.gliss[s] * this.detune;
          const o = this.ctx.createOscillator();
          o.type = b.leadType || "square";
          o.frequency.setValueAtTime(fT * 0.5, t);
          o.frequency.exponentialRampToValueAtTime(fT, t + spb * 3);
          const g = this.ctx.createGain();
          const gv = b.glissGain != null ? b.glissGain : 0.03;
          g.gain.setValueAtTime(1e-4, t);
          g.gain.exponentialRampToValueAtTime(gv, t + 0.02);
          g.gain.setValueAtTime(gv, t + spb * 3);
          g.gain.exponentialRampToValueAtTime(1e-4, t + spb * 4);
          o.connect(g);
          g.connect(this.musicBus);
          const pans = [-0.8, 0.1, 0.8];
          pans.forEach((pv, e) => {
            const d = this.ctx.createDelay(2);
            d.delayTime.value = spb * 2 * (e + 1);
            const eg = this.ctx.createGain();
            eg.gain.value = 0.5 * Math.pow(0.6, e);
            g.connect(d);
            d.connect(eg);
            if (this.ctx.createStereoPanner) {
              const p = this.ctx.createStereoPanner();
              p.pan.value = pv;
              eg.connect(p);
              p.connect(this.musicBus);
            } else {
              eg.connect(this.musicBus);
            }
          });
          o.start(t);
          o.stop(t + spb * 4 + 0.02);
        }
        if (b.chords && b.chords[s]) {
          for (const cf of b.chords[s]) play(cf, b.chordType || "square", spb * (b.chordDur || 2.6), b.chordGain ?? 0.05, b.chordAttack || 0.01);
        }
        if (b.kick && b.kick[s]) {
          const t = this.nextTime;
          const kg = b.kickGain ?? 1;
          const tail = b.kickTail ?? 0.2;
          const o = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          o.type = "sine";
          o.frequency.setValueAtTime(165, t);
          o.frequency.exponentialRampToValueAtTime(48, t + 0.05);
          g.gain.setValueAtTime(1e-4, t);
          g.gain.exponentialRampToValueAtTime(0.42 * kg, t + 6e-3);
          g.gain.exponentialRampToValueAtTime(1e-3, t + tail);
          o.connect(g);
          g.connect(this.musicBus);
          if (b.echoEverything) g.connect(this.echoBus);
          o.start(t);
          o.stop(t + tail + 0.04);
          const src = this.ctx.createBufferSource();
          src.buffer = this.noiseBuf;
          const cf = this.ctx.createBiquadFilter();
          cf.type = "highpass";
          cf.frequency.value = 1900;
          const cg = this.ctx.createGain();
          cg.gain.setValueAtTime(0.13 * kg, t);
          cg.gain.exponentialRampToValueAtTime(1e-3, t + 0.012);
          src.connect(cf);
          cf.connect(cg);
          cg.connect(this.musicBus);
          if (b.echoEverything) cg.connect(this.echoBus);
          src.start(t);
          src.stop(t + 0.03);
          const knock = b.kickKnock ?? 1;
          if (knock > 0) {
            const k = this.ctx.createOscillator();
            const kgn = this.ctx.createGain();
            k.type = "triangle";
            k.frequency.setValueAtTime(300, t);
            k.frequency.exponentialRampToValueAtTime(180, t + 0.04);
            kgn.gain.setValueAtTime(1e-4, t);
            kgn.gain.exponentialRampToValueAtTime(0.17 * kg * knock, t + 4e-3);
            kgn.gain.exponentialRampToValueAtTime(1e-3, t + 0.05);
            k.connect(kgn);
            kgn.connect(this.musicBus);
            if (b.echoEverything) kgn.connect(this.echoBus);
            k.start(t);
            k.stop(t + 0.07);
          }
        }
        if (b.hats && b.hats[s]) {
          const t = this.nextTime;
          const src = this.ctx.createBufferSource();
          src.buffer = this.noiseBuf;
          const f = this.ctx.createBiquadFilter();
          f.type = "highpass";
          f.frequency.value = 5200;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.14, t);
          g.gain.exponentialRampToValueAtTime(1e-3, t + 0.05);
          src.connect(f);
          f.connect(g);
          g.connect(this.musicBus);
          if (b.echoEverything) g.connect(this.echoBus);
          src.start(t);
          src.stop(t + 0.07);
        }
        if (b.vox && b.vox[s]) {
          const t = this.nextTime;
          const f0 = b.vox[s];
          const [fm1, fm2] = s % 8 < 4 ? [750, 1150] : [600, 2e3];
          const o = this.ctx.createOscillator();
          o.type = "sawtooth";
          o.frequency.setValueAtTime(f0 * 1.3 * this.detune, t);
          o.frequency.exponentialRampToValueAtTime(f0 * this.detune, t + 0.07);
          const env = this.ctx.createGain();
          env.gain.setValueAtTime(1e-4, t);
          env.gain.exponentialRampToValueAtTime(0.55, t + 0.02);
          env.gain.exponentialRampToValueAtTime(1e-4, t + 0.18);
          const mix2 = this.ctx.createGain();
          mix2.gain.value = 0.55;
          const fa = this.ctx.createBiquadFilter();
          fa.type = "bandpass";
          fa.frequency.value = fm1;
          fa.Q.value = 5;
          const fb2 = this.ctx.createBiquadFilter();
          fb2.type = "bandpass";
          fb2.frequency.value = fm2;
          fb2.Q.value = 8;
          o.connect(env);
          env.connect(fa);
          env.connect(fb2);
          fa.connect(mix2);
          fb2.connect(mix2);
          mix2.connect(this.musicBus);
          if (b.echoEverything) mix2.connect(this.echoBus);
          o.start(t);
          o.stop(t + 0.2);
        }
        if (b.shout && b.shout[s]) {
          const t = this.nextTime;
          const f0 = b.shout[s] * this.detune;
          const word = (Math.floor(this.step / 32) + s) % 2 === 0 ? "yeah" : "alright";
          const dur = word === "yeah" ? 0.32 : 0.46;
          const traj = word === "yeah" ? [[0, 320, 2100], [0.08, 560, 1800], [0.28, 760, 1250]] : [[0, 520, 950], [0.16, 700, 1300], [0.22, 640, 1100], [0.3, 720, 1350], [0.44, 400, 2e3]];
          const o = this.ctx.createOscillator();
          o.type = "sawtooth";
          if (word === "yeah") {
            o.frequency.setValueAtTime(f0 * 1.25, t);
            o.frequency.exponentialRampToValueAtTime(f0 * 0.9, t + dur);
          } else {
            o.frequency.setValueAtTime(f0, t);
            o.frequency.setValueAtTime(f0, t + 0.2);
            o.frequency.exponentialRampToValueAtTime(f0 * 1.25, t + 0.28);
            o.frequency.exponentialRampToValueAtTime(f0 * 0.8, t + dur);
          }
          const env = this.ctx.createGain();
          env.gain.setValueAtTime(1e-4, t);
          env.gain.exponentialRampToValueAtTime(0.5, t + 0.02);
          if (word === "alright") {
            env.gain.exponentialRampToValueAtTime(0.2, t + 0.2);
            env.gain.exponentialRampToValueAtTime(0.5, t + 0.26);
          }
          env.gain.exponentialRampToValueAtTime(1e-4, t + dur);
          const mix2 = this.ctx.createGain();
          mix2.gain.value = b.shoutGain != null ? b.shoutGain : 0.5;
          const fa = this.ctx.createBiquadFilter();
          fa.type = "bandpass";
          fa.Q.value = 5;
          const fb2 = this.ctx.createBiquadFilter();
          fb2.type = "bandpass";
          fb2.Q.value = 8;
          fa.frequency.setValueAtTime(traj[0][1], t);
          fb2.frequency.setValueAtTime(traj[0][2], t);
          for (const [tt, F1, F2] of traj.slice(1)) {
            fa.frequency.linearRampToValueAtTime(F1, t + tt);
            fb2.frequency.linearRampToValueAtTime(F2, t + tt);
          }
          o.connect(env);
          env.connect(fa);
          env.connect(fb2);
          fa.connect(mix2);
          fb2.connect(mix2);
          mix2.connect(this.musicBus);
          if (b.echoEverything) mix2.connect(this.echoBus);
          o.start(t);
          o.stop(t + dur + 0.02);
        }
        if (b.ohats && b.ohats[s]) {
          const t = this.nextTime;
          const src = this.ctx.createBufferSource();
          src.buffer = this.noiseBuf;
          const f = this.ctx.createBiquadFilter();
          f.type = "highpass";
          f.frequency.value = 4200;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.12, t);
          g.gain.exponentialRampToValueAtTime(1e-3, t + 0.22);
          src.connect(f);
          f.connect(g);
          g.connect(this.musicBus);
          if (b.echoEverything) g.connect(this.echoBus);
          src.start(t);
          src.stop(t + 0.24);
        }
        if (b.snare && b.snare[s]) {
          const t = this.nextTime;
          const src = this.ctx.createBufferSource();
          src.buffer = this.noiseBuf;
          const f = this.ctx.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.value = 2600;
          f.Q.value = 0.7;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.32, t);
          g.gain.exponentialRampToValueAtTime(1e-3, t + 0.09);
          src.connect(f);
          f.connect(g);
          g.connect(this.musicBus);
          if (b.echoEverything) g.connect(this.echoBus);
          src.start(t);
          src.stop(t + 0.11);
          const o = this.ctx.createOscillator();
          const og = this.ctx.createGain();
          o.type = "triangle";
          o.frequency.setValueAtTime(210, t);
          o.frequency.exponentialRampToValueAtTime(140, t + 0.05);
          og.gain.setValueAtTime(0.12, t);
          og.gain.exponentialRampToValueAtTime(1e-3, t + 0.06);
          o.connect(og);
          og.connect(this.musicBus);
          if (b.echoEverything) og.connect(this.echoBus);
          o.start(t);
          o.stop(t + 0.08);
        }
        if (b.crash && b.crash[s]) {
          const t = this.nextTime;
          const dur = spb * (b.crashDur || 5);

    // The status-pill battery cells. These are NOT the `battery` pickup above:
    // that one is a chunky upright cell drawn to read as a thing lying in the
    // world, and four of them in a row at HUD size turn into a picket fence. The
    // HUD wants a lozenge — wide, low, with the bolt reading at 11 units across —
    // so it gets its own art in the panel's colour language.
    //
    // Full and empty are separate painters rather than one with a flag because
    // the sprite cache is keyed by name; a flag would collide on one entry.
    cellFull(ctx, w, h) {
      hudCell(ctx, w, h, true);
    },

      hudCell(ctx, w, h, false);
    },
    // The coin beside them. The world `coin` is a flat disc with a stamped
    // centre, which at 12 units in a dark panel reads as a washer; this one is a
    // lit sphere — gradient plus a warm rim — so it holds its shape and stays
    // legibly gold against the slate fill.
    hudCoin(ctx, w, h) {
      const r = Math.min(w, h) / 2;
      const g = ctx.createRadialGradient(w * 0.36, h * 0.32, r * 0.15, w * 0.5, h * 0.5, r);
      g.addColorStop(0, "#ffe07a");
      g.addColorStop(1, "#f0b419");
      ctx.beginPath();
      ctx.arc(w / 2, h / 2, r - r / 12, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = "#d99a10";
      ctx.lineWidth = r / 6;
      ctx.stroke();

        if (!ob.live) continue;
        if (ob.def.isGap) {
          const over = pbox.x + pbox.w / 2 > ob.x && pbox.x + pbox.w / 2 < ob.x + ob.w;
          if (over && this.player.grounded && this.player.y <= 0) {
            this.takeHit("GRAVITY REMAINS UNDEFEATED", true);
          }
          continue;
        }
        if (ob.def.isBoost) {
          const box2 = entityBox(ob, this.groundYAt(ob.x));
          if (overlaps(pbox, box2) && this.player.grounded) {
            if (!ob.used) {
              ob.used = true;
              this.speedBoost = Math.min(1, this.speedBoost + 0.5);
              Audio.sfx("dash");
              this.score += 50;
              if (this.challenge && this.challenge.type === "boosts") this.challenge.count++;
              for (let i = 0; i < 8; i++) spawn(pbox.x - i * 4, GROUND_Y2 - 4, -60, -20, 0.4, "#f6d33c", 2, 0);
            }
          }
          continue;
        }
        const box = entityBox(ob, this.groundYAt(ob.x));
        if (ob.landedOn) {
          if (pbox.x > box.x + box.w) ob.landedOn = false;
          else continue;
        }
        if (!overlaps(pbox, box)) continue;
        const playerBottom = pbox.y + pbox.h;
        const landedOnCrate = ob.type === "crate" && this.player.vy <= 0 && pbox.x >= box.x && pbox.x + pbox.w <= box.x + box.w && playerBottom <= box.y + 10;
        if (landedOnCrate) {
          ob.landedOn = true;
          continue;
        }
        if (this.player.rolling && ob.def.action === "duck") continue;
        if (this.player.invincible || this.powerups.isInvincible()) {
          if ((this.player.dashT > 0 || this.powerups.isInvincible()) && ob.def.breakable) this.breakObstacle(ob);
          continue;
        }
        if (this.player.stomping && ob.def.breakable) {
          this.breakObstacle(ob);
          this.player.vy = 200;
          this.player.grounded = false;
          this.player.jumps = 1;
          this.player.stomping = false;
          shake(2, 0.15);
          continue;
        }
        if (this.player.rolling && this.player.rollPlows && ob.def.breakable) {
          this.breakObstacle(ob);
          continue;
        }
        if (this.player.rolling && this.modIds.includes("bash") && !this.player.rollBashed && ob.def.ground && ob.def.breakable) {
          this.player.rollBashed = true;
          this.breakObstacle(ob);
          this.player.rollT = 0;
          this.player.stumbleT = 0.3;
          this.floatText("SHIELD BASH. EARS RINGING.", "#a8e6ff");
          continue;
        }
        if (ob.def.isTarget || ob.def.isSwitch) {
          this.breakObstacle(ob);
          continue;
        }
        this.takeHit(null, false, ob.type);
        break;
      }
      for (const p of this.pickups) {
        if (!p.live) continue;
        if (p.def.resident && p.following) {
          p.x = playerX - 16;
          continue;
        }
        const box = { x: p.x, y: this.groundYAt(p.x) - p.alt - p.h, w: p.w, h: p.h };
        if (!overlaps(pbox, box)) continue;
        p.live = false;
        this.onPickup(p);
      }
    }
    onPickup(p) {
      const hero = HERO_BY_ID[this.relay.current];
      const pickMult = hero.pickupBonus || 1;
      if (p.def.coin) {
        this.coinCombo++;
        this.coinComboT = 1;
        const val = Math.round(50 * pickMult * this.powerups.scoreMult());
        this.score += val;
        this.coins += 1;
        Audio.sfx(hero.id === "chompo" ? "waka" : "coin", { combo: Math.min(12, this.coinCombo) });
        spawn(p.x, this.groundYAt(p.x) - p.alt - 8, 0, -40, 0.4, "#f6d33c", 1, 0);
      } else if (p.def.heal) {
        this.battery = Math.min(this.maxBattery(), this.battery + 1);
        Audio.sfx("power");
      } else if (p.def.relayCharge) {
        this.grantRelayCharge();
      } else if (p.def.power) {
        const res = this.powerups.grab(p.def.power);
        Audio.sfx("power");
        if (res.overcharged) this.floatText("OVERCHARGED", "#f6d33c");
      } else if (p.def.appliance) {
        this.applianceGot = true;
        Audio.sfx("win");
        this.score += 500;
        this.coins += 20;
        this.floatText("THE HIGHLY NECESSARY GOLDEN APPLIANCE. IT IS A TOASTER.", "#f6d33c");
        this.goalToast("BONUS: THE GOLDEN APPLIANCE", true);
      } else if (p.def.cord) {
        this.mission.count++;
        Audio.sfx("checkpoint");
        this.floatText(`CORD PIECE ${this.mission.count}/${this.mission.n}`, "#48e0c8");
      } else if (p.def.resident) {
        p.live = true;
        p.following = true;
        Audio.sfx("ui");
        this.floatText("A RESIDENT FOLLOWS YOU. CONFUSED BUT GAME.", "#9ec89e");
      }
    }
    // ------------------------------------------------------------------ damage
    takeHit(msg, isPit = false, src = null) {
      if (this.player.iframes > 0) return;
      if (this.devInvuln) this.devHits.push({ type: src || (isPit ? "pit" : "hazard"), worldX: Math.floor(this.playerWorldX()) });
      if (!isPit && this.powerups.isInvincible()) {
        this.player.iframes = 0.35;
        Audio.sfx("shield");
        this.floatText("UNPEELABLE.", "#e8e8f0");
        return;
      }
      const absorb = this.powerups.absorbHit();
      sunShock();
      if (absorb.absorbed) {
        Audio.sfx("shield");
        shake(3, 0.2);
        burst(this.camX + PLAYER_X + 6, GROUND_Y2 - this.player.y - 12, 18, 140, 0.5, "#a8e6ff", 1, 120, () => this.fxRng.float());
        this.floatText("SHIELD BROKE. IT DID ITS JOB.", "#a8e6ff");
        this.player.iframes = 1.2;
        if (this.relay.current === "fernwick" && this.modIds.includes("prophecyCoupon")) this.coins += 50;
        if (absorb.shockwave) {
          for (const ob of this.obstacles) {
            if (ob.live && ob.def.breakable && Math.abs(ob.x - (this.camX + PLAYER_X)) < 70) this.breakObstacle(ob);
          }
        }
        if (isPit) this.hopOutOfPit();
        return;
      }
      const hero = HERO_BY_ID[this.relay.current];
      const graceMax = 1;
      if (hero.assemblyGrace && this.player.assemblyGraceUsed < graceMax && (this.battery <= 1 || this.oneHit)) {
        this.player.assemblyGraceUsed++;
        this.player.headless = 3;
        this.player.iframes = 3;
        Audio.sfx("plop");
        this.floatText("RAY M'N SCATTERED. REASSEMBLY IS IN PROGRESS.", "#48e0c8");
        if (isPit) this.hopOutOfPit();
        return;
      }
      if (!this.devInvuln) this.battery--;
      this.damageTaken++;
      if (this.challenge && this.challenge.type === "noDamage") this.challenge.failed = true;
      if (this.mission.type === "fuse" && this.battery > 0) this.floatText("THE FUSE SURVIVED. BARELY. IT SAW EVERYTHING.", "#e04848");
      Audio.sfx("hit");
      shake(5, 0.3);
      this.hitstop = 0.12;
      burst(this.camX + PLAYER_X + 6, GROUND_Y2 - this.player.y - 8, 16, 90, 0.6, "#e04848", 2, 140, () => this.fxRng.float());
      if (this.battery <= 0) {
        this.die(msg);
      } else {
        this.player.iframes = this.devInvuln ? 0.35 : 1.4;
        if (isPit) this.hopOutOfPit();
      }
    }
    // ------------------------------------------------------------------- dev
    // Force a clean win from wherever the run currently is. Satisfies the mission
    // and challenge rather than fabricating a result, so the real endRun/rank/
    // reward pipeline is what gets exercised.
    devPerfect() {
      if (this.finished) return;
      this.devForceMission = true;
      if (this.mission && this.mission.n) this.mission.count = this.mission.n;
      if (this.challenge) {
        this.challenge.failed = false;
        if (this.challenge.n) this.challenge.count = this.challenge.n;
      }
      this.applianceGot = true;
      this.damageTaken = 0;
      this.endRun(true);
    }
    // Drop an obstacle just ahead of the player for a close look at one hazard.
    devSpawn(type) {
      if (!OBSTACLES[type]) return null;
      const ob = makeObstacle(type, this.camX + PLAYER_X + 150);
      this.obstacles.push(ob);
      return ob;
    }
    // Rolled-up tally of what the level actually threw at us. The spawner builds
    // patterns procedurally, so this is not derivable from data/stages.js.
    devHitTally() {
      const counts = {};
      for (const h of this.devHits) counts[h.type] = (counts[h.type] || 0) + 1;
      return counts;
    }
    hopOutOfPit() {
      this.player.vy = 260;
      this.player.grounded = false;
      this.player.jumps = 1;
    }
    die(msg) {
      this.dead = true;
      this.deadT = 0;
      this.failMsg = msg || this.fxRng.pick(FAIL_MESSAGES);
      Audio.sfx("die");
      this.save.slot.stats.deaths++;
    }
    updateDead(dt) {
      this.deadT += dt;
      this.player.vy -= this.gravityForDeath() * dt;
      this.player.y += this.player.vy * dt;
      if (this.deadT > 1.4) {
        if (this.demo) {
          this.endRun(false);
        } else if (this.snapshot && !this.oneHit) {
          this.restoreSnapshot(this.snapshot);
        } else if (!this.oneHit && !this.overtime) {
          this.seed = this.seed + 1 >>> 0;
          this.o.seed = this.seed;
          this.enter();
        } else {
          this.endRun(false);
        }
      }
    }
    gravityForDeath() {
      return 600;
    }
    endRun(success, reason) {
      if (this.finished) return;
      this.finished = true;
      Audio.setDetune(1);
      this.invActive = false;
      Audio.setInvincible(false);
      if (success && this.mission.type === "rescue") {
        for (const p of this.pickups) {
          if (p.live && p.def.resident && p.following) {
            p.live = false;
            this.mission.count++;
          }
        }
      }
      const result = {
        success,
        reason,
        stage: this.stage,
        overtime: this.overtime,
        corrupted: this.corrupted,
        score: Math.floor(this.score),
        coins: this.coins,
        damageTaken: this.damageTaken,
        bestCombo: 0,
        challengeDone: this.challenge ? !this.challenge.failed && (this.challenge.type === "noDamage" ? this.damageTaken === 0 : this.challenge.count >= this.challenge.n) : false,
        applianceGot: this.applianceGot,
        team: [...this.usedHeroes],
        failMsg: this.failMsg,
        distance: Math.floor(this.distance),
        time: this.tRun
      };
      this.o.onEnd(result);
    }
    // Feedback popups all rise from one place: a stack above the hero's column.
    // They used to spawn at whatever world object triggered them, which scattered
    // text across the screen — and in a runner everything that matters happens to
    // the hero anyway, so the hero's column is where the eye already is.
    floatText(text, color) {
      const readingTime = Math.min(3.2, 1.6 + Math.max(0, text.length - 18) * 0.035);
      let y = FLOAT_BASE_Y;
      for (const f of this.floaties) if (f.y + 19 > y) y = f.y + 19;
      this.floaties.push({ text, color, t: readingTime, y });
      if (this.floaties.length > 8) this.floaties.shift();
    }
    // ACT announcement: full-screen corporate-glitch card over the frozen world.
    // Only authored stage.intro text is shown — split at the first sentence so
    // the act number slams as a title and the subtitle sits under it.
    drawActBanner(d) {
      const a = Math.min(1, this.introFreeze / 0.3);
      const dot2 = this.introText.indexOf(". ");
      const head = dot2 > 0 ? this.introText.slice(0, dot2) : this.introText;
      const tail = dot2 > 0 ? this.introText.slice(dot2 + 2) : "";
      const still = this.save.settings.reducedMotion;
      const jx = (i) => still ? 0 : Math.round(Math.sin(this.introT * 47 + i * 13) * 1.5);
      d.save();
      d.globalAlpha = a;
      d.fillStyle = "rgba(0,0,0,0.78)";
      d.fillRect(0, 0, W, H);
      drawTextCentered(d, head, W / 2 - 1 + jx(1), 92, "#c83030", 2, "title");
      drawTextCentered(d, head, W / 2 + 1 - jx(2), 92, "#48e0c8", 2, "title");
      drawTextCentered(d, head, W / 2, 92, "#fff", 2, "title");
      wrapText(tail, W - 48, 1, 3).forEach((line, i) => drawTextCentered(d, line, W / 2, 128 + i * 12, "#c8c8d8"));
      if (!still) {
        d.fillStyle = "rgba(200,48,48,0.3)";
        for (let i = 0; i < 4; i++) {
          const y = (i * 67 + Math.floor(this.introT * 140)) % H;
          d.fillRect(jx(i) * 2, y, W, 1);
        }
      }
      d.restore();
    }
    // ------------------------------------------------------------------ draw
    draw(ctx) {
      const cam = this.camX;
      ctx.save();
      if (this.mirror) {
        ctx.translate(W, 0);
        ctx.scale(-1, 1);
      }
      this.style.bg(ctx, this.tRun, cam, this.cabinet, this.totalDist);
      this.style.ground(ctx, cam, this.cabinet, this.obstacles);
      if (!this.bossCab) drawTerrain(ctx, cam, this.cabinet, this.obstacles, GROUND_Y2);
      const drawActors = () => {
        const finishX = this.overtime ? Infinity : this.finishWorldX();
        for (const p of this.pickups) if (p.live && p.x < finishX) this.drawAtGround(ctx, p.x, () => drawWorldEntity(ctx, p, cam, this.tRun, this.style, this.save.settings), p.w);
        for (const ob of this.obstacles) if (ob.live && ob.x < finishX) this.drawAtGround(ctx, ob.x, () => drawWorldEntity(ctx, ob, cam, this.tRun, this.style, this.save.settings), ob.w, ob.def.ground && ob.alt === 0 ? 1.5 : 0);
        for (const pr of this.projectiles) {
          const x = Math.round(pr.x - cam), y = Math.round(this.groundYAt(pr.x) - pr.alt - 4);
          if (pr.type === "enemyShot") {
            ctx.fillStyle = "#101018";
            ctx.fillRect(x - 1, y - 1, 6, 6);
            ctx.fillStyle = pr.telegraph > 0 ? "#f6d33c" : "#e04848";
            ctx.fillRect(x, y, 4, 4);
            ctx.fillStyle = "#fff";
            ctx.fillRect(x + 1, y + 1, 2, 2);
            if (pr.telegraph > 0) {
              ctx.strokeStyle = "#f6d33c";
              ctx.strokeRect(x - 3, y - 3, 10, 10);
            }
          } else if (pr.type === "axe") {
            drawThrownAxe(ctx, x + 4, y + 4, pr.t * 12);
          } else if (pr.type === "fist") {
            drawRocketFist(ctx, x + 4, y + 2, pr.t, pr.returning);
          } else {
            ctx.fillStyle = "#f6d33c";
            ctx.beginPath();
            ctx.arc(x + 3, y + 2, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff0a0";
            ctx.fillRect(x + 2, y, 2, 1);
          }
        }
      };
      if (!this.style.actorsAbovePost) drawActors();
      if (!this.finishing && this.portal) this.drawAtGround(ctx, this.portal.x, () => drawPortal(ctx, this.portal, cam, this.tRun));
      if (!this.finishing && this.copter) this.drawAtGround(ctx, this.copter.x, () => drawCopter(ctx, this.copter, cam, this.tRun));
      if (this.escapeWall != null) {
        const x = Math.round(this.escapeWall - cam);
        ctx.fillStyle = "rgba(20,10,30,0.85)";
        ctx.fillRect(x - 100, 0, 100, H);
        ctx.fillStyle = "#8858c8";
        for (let i = 0; i < 6; i++) ctx.fillRect(x - 4 + Math.sin(this.tRun * 6 + i) * 3, i * 45, 4, 30);
      }
      if (!this.overtime && Number.isFinite(this.totalDist)) {
        const remaining = this.totalDist - this.distance;
        if (remaining < 560) {
          const fx = this.finishing ? FINISH_LINE_X : Math.round(remaining + PLAYER_X);
          const finishGround = this.finishing ? this.groundYAt(this.finishWorldX()) : this.groundYAt(this.camX + fx);
          for (let i = 0; i < 10; i++) {
            ctx.fillStyle = i % 2 === 0 ? "#f6d33c" : "#0b0b14";
            ctx.fillRect(fx, finishGround - 80 + i * 8, 5, 8);
          }
          ctx.fillStyle = "#3a4a5a";
          ctx.fillRect(fx + 7, finishGround - 34, 18, 34);
          ctx.fillStyle = "#f6d33c";
          ctx.fillRect(fx + 13, finishGround - 28, 6, 10);
          ctx.fillStyle = "#0b0b14";
          ctx.fillRect(fx + 15, finishGround - 26, 2, 3);
          ctx.fillRect(fx + 12, finishGround - 25, 2, 3);
          drawText(ctx, "THE BREAKER", fx - 14, finishGround - 94, "#f6d33c", 1, "ui", UI_PLATE);
        }
      }
      if (!this.finishing && this.player.abilityCd <= 0 && (this.relay.current === "lorenzo" || this.relay.current === "chompo")) {
        const target = this.powerTarget();
        if (target) {
          const tx = Math.round(target.x - cam + target.w / 2);
          const ty = Math.round(this.groundYAt(target.x) - target.alt - target.h / 2);
          const pulse = this.save.settings.reducedMotion ? 4 : 4 + Math.sin(this.tRun * 7);
          ctx.strokeStyle = "rgba(246,211,60,0.65)";
          ctx.beginPath();
          ctx.arc(tx, ty, Math.max(target.w, target.h) * 0.65 + pulse, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      const heroScreenX = this.finishing ? this.finishPlayerX : PLAYER_X;
      const drawHero = () => drawHeroSprite(
        ctx,
        this.player,
        this.relay.current,
        this.tRun,
        cam,
        this.mission.type === "fuse",
        {
          mirror: this.mirror,
          flat: this.paused || this.dead,
          screenX: heroScreenX,
          groundY: this.groundYAt(cam + heroScreenX),
          shield: this.powerups.shieldStack,
          settings: this.save.settings,
          invincible: this.powerups.active.unpeel ? this.powerups.active.unpeel.t : 0
        }
      );
      if (!this.style.actorsAbovePost) drawHero();
      drawParticles(ctx, cam);
      this.style.post(ctx, this.tRun);
      if (this.style.actorsAbovePost) {
        drawActors();
        drawHero();
      }
      if (this.mission.type === "blackout") {
        const px = PLAYER_X + 6, py = this.groundYAt(cam + PLAYER_X) - this.player.y - 8;
        const r = this.briefSlow > 0 ? 260 : 130;
        const g = ctx.createRadialGradient(px, py, r * 0.35, px, py, r);
        g.addColorStop(0, "rgba(8,6,12,0)");
        g.addColorStop(0.6, "rgba(8,6,12,0.28)");
        g.addColorStop(1, "rgba(8,6,12,0.58)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }
      ctx.restore();
      const drawUi = (d) => {
        const floatX = this.mirror ? W - PLAYER_X - 6 : PLAYER_X + 6;
        const edgeX = this.mirror ? W - PLAYER_X : PLAYER_X;
        for (const f of this.floaties) {
          const short = f.text.length <= 5;
          const lines = wrapText(f.text, short ? W - 32 : W - PLAYER_X - 8, 1, 2);
          const topY = Math.max(38, Math.min(H - 48 - lines.length * 10, Math.round(f.y)));
          const tw = Math.max(...lines.map((line) => textWidth(line)));
          const PADX = 5;
          const bx = short ? floatX - tw / 2 - PADX : this.mirror ? edgeX - tw - PADX : edgeX - PADX;
          d.save();
          d.globalAlpha = Math.max(0, Math.min(1, f.t / 0.25));
          drawPanel(
            d,
            Math.round(bx),
            topY - 4,
            tw + PADX * 2,
            lines.length * 10 + 8,
            4,
            FLOAT_PANEL,
            { border: FLOAT_BORDER, shadow: true }
          );
          lines.forEach((line, i) => {
            if (short) drawTextCentered(d, line, floatX, topY + i * 10, f.color);
            else drawText(d, line, this.mirror ? edgeX - textWidth(line) : edgeX, topY + i * 10, f.color);
          });
          d.restore();
        }
        if (this.speech) drawSpeech(d, this.speech);
        drawHud(d, this);
        if (this.introFreeze > 0 && this.introText) this.drawActBanner(d);
      };
      if (!pushOverlayDraw(drawUi)) drawUi(ctx);
      if (this.paused) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, W, H);
        drawTextCentered(ctx, "PAUSED", W / 2, 84, "#fff", 2, "title");
        const pHero = HERO_BY_ID[this.relay.current];
        const pBtn = Input.usingTouch ? "PWR" : "RIGHT/D";
        drawTextCentered(ctx, pHero.name, W / 2, 112, "#48e0c8");
        drawTextCentered(ctx, `${pBtn}: ${pHero.ability.label}  ${this.player.abilityCd <= 0 ? "READY" : `${this.player.abilityCd.toFixed(1)}S`}`, W / 2, 124, "#f6d33c");
        drawTextCentered(ctx, `MISSION: ${this.mission.desc}`, W / 2, 138, "#c8e0ff");
        if (!this.overtime && this.stage) {
          const got = goalsDone(this).filter(Boolean).length;
          drawTextCentered(ctx, `GOALS ${got}/3`, W / 2, 150, got ? "#f6d33c" : "#8a8a98");
        }
        if (this.player.relayCharge) drawTextCentered(ctx, "POWER CHARGED: SPEND IT", W / 2, 162, "#f890b8");
        drawTextCentered(ctx, Input.usingTouch ? "TAP JUMP   SWIPE DOWN DUCK   PWR POWER" : "SPACE JUMP   DOWN DUCK   RIGHT/D POWER", W / 2, 178, "#c8c8d8");
        drawTextCentered(ctx, "P: RESUME   ESC: QUIT TO HUB", W / 2, 192, "#8a8a98");
      }
      if (this.dead) {
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(0, 0, W, H);
        drawTextCentered(ctx, this.failMsg || "UNPLUGGED", W / 2, 110, "#e04848", 1);
      }
      if (this.debug) this.drawDebug(ctx);
    }
    drawDebug(ctx) {
      ctx.strokeStyle = "#0f0";
      const pb = this.player.box(this.camX, this.groundYAt(this.camX + PLAYER_X));
      ctx.strokeRect(pb.x - this.camX, pb.y, pb.w, pb.h);
      ctx.strokeStyle = "#f00";
      for (const ob of this.obstacles) {
        if (!ob.live) continue;
        const b = entityBox(ob, this.groundYAt(ob.x));
        ctx.strokeRect(b.x - this.camX, b.y, b.w, b.h);
      }
      drawText(ctx, `SEED ${this.seed} SPD ${Math.round(this.speed)} X ${Math.round(this.camX)}`, 4, H - 10, "#0f0");
    }
  };

  // src/game/draw.js
  var POWER_GLOW = {
    capShield: "rgba(72,168,240,0.5)",
    capMagnet: "rgba(224,72,72,0.45)",

        { label: "FIELD GUIDE", act: go(() => setState(new FieldGuideState({ settings: save2.settings, onDone: () => Flow2.toHub() }))) },
        { label: "SOUND TEST", act: go(() => setState(new SoundTestState({ onDone: () => Flow2.toHub() }))) },
        { label: "HOW TO PLAY", act: go(() => setState(new HowToPlayState({ onDone: () => Flow2.toHub() }))) },
        { label: "OVERTIME", act: go(() => Flow2.startOvertime(dev.seedLock ?? void 0)) },
        {
          label: "MINIGAMES \u25B8",
          submenu: () => ({
            title: "MINIGAMES",
            items: MINIGAMES.map((g) => ({ label: g.toUpperCase(), act: go(() => Flow2.playMinigame(g)) }))
          })
        }
      ]
    });
    return { ...build(), rebuild: build };
  }
  function saveMenu(dev) {
    const { save: save2 } = dev.ctx;
    const slot = () => save2.slot;
    const build = () => {
      const s = slot();
      if (!s) return { title: "SAVE", items: [{ label: "NO SLOT SELECTED \u2014 start a game first", act: null }] };
      return {
        title: "SAVE",
        items: [
          {
            label: "UNLOCK EVERYTHING",
            act: () => {
              for (const st of STAGES) s.campaign.plugs[st.id] = [true, true, true];
              for (const cab of CABINETS) s.campaign.cleared[cab.id] = true;
              for (const b of Object.keys(BOSSES)) s.campaign.bossesDown[b] = true;
              s.campaign.storyFlags.sawIntro = true;
              save2.persist();
              dev.say("EVERYTHING UNLOCKED");
            }
          },
          {
            label: "WIPE PROGRESS (keep slot)",
            act: () => {
              s.campaign.plugs = {};
              s.campaign.cleared = {};
              s.campaign.bossesDown = {};
              save2.persist();
              dev.say("PROGRESS WIPED");
            }
          },
          { label: `PLUGS: ${totalPlugs(s)}/${MAX_PLUGS}`, act: null },
          {
            label: `COINS: ${formatCoins(s.coins)}`,
            adjust: (d) => {
              s.coins = Math.max(0, s.coins + d * 500);
              save2.persist();
            }
          },
          {
            label: `DIFFICULTY: ${s.difficulty}`,
            adjust: (d) => {
              s.difficulty = Math.min(5, Math.max(1, s.difficulty + d));
              save2.persist();
            }
          },
          {
            label: "GRANT ALL MODS",
            act: () => {
              s.mods.found = MODS.map((m) => m.id);
              save2.persist();
              dev.say(`${s.mods.found.length} MODS GRANTED`);
            }
          },
          {
            label: "MAX BENCH UPGRADES",
            act: () => {
              for (const u of BENCH_UPGRADES) s.bench[u.id] = u.max;
              save2.persist();
              dev.say("BENCH MAXED");
            }
          },
          {
            label: "MARK BOSSES DOWN",
            act: () => {
              for (const b of Object.keys(BOSSES)) s.campaign.bossesDown[b] = true;
              save2.persist();
              dev.say("BOSSES MARKED DOWN");
            }
          }
        ]
      };
    };
    return { ...build(), rebuild: build };
  }
  function spawnMenu(dev) {
    const build = () => ({
      title: "SPAWN",
      items: Object.keys(OBSTACLES).map((type) => ({
        label: type,
        act: () => {
          const r = dev.run();
          if (!r) return dev.say("NO RUN ACTIVE");
          r.devSpawn(type);
          dev.say(`SPAWNED ${type}`);
        }
      }))
    });
    return { ...build(), rebuild: build };
  }
  function runMenu(dev) {
    const build = () => {
      const r = dev.run();
      if (!r) {
        return {
          title: "RUN",
          items: [
            { label: "NO RUN ACTIVE", act: null },
            { label: `SEED LOCK: ${dev.seedLock ?? "off"}`, adjust: (d) => {
              dev.seedLock = dev.seedLock == null ? 1e3 : Math.max(0, dev.seedLock + d);
            } },
            { label: `TIME SCALE: x${dev.timeScale}`, adjust: (d) => dev.cycleSpeed(d) }
          ]
        };
      }
      return {
        title: "RUN",
        items: [
          { label: `INVULNERABLE: ${r.devInvuln ? "ON" : "off"}`, act: () => {
            r.devInvuln = !r.devInvuln;
          } },
          { label: `FORCE MISSION: ${r.devForceMission ? "ON" : "off"}`, act: () => {
            r.devForceMission = !r.devForceMission;
          } },
          { label: `HITBOXES: ${r.debug ? "ON" : "off"}`, act: () => {
            r.debug = !r.debug;
          } },
          { label: `TIME SCALE: x${dev.timeScale}`, adjust: (d) => dev.cycleSpeed(d) },
          { label: `SEED LOCK: ${dev.seedLock ?? "off"}`, adjust: (d) => {
            dev.seedLock = dev.seedLock == null ? r.seed : Math.max(0, dev.seedLock + d);
          } },
          { label: `BATTERY: ${r.battery}/${r.maxBattery()}`, adjust: (d) => {
            r.battery = Math.min(r.maxBattery(), Math.max(0, r.battery + d));
          } },
          { label: "REFILL BATTERY", act: () => {
            r.battery = r.maxBattery();
            dev.say("BATTERY FULL");
          } },
          { label: "WIN NOW", act: () => {
            dev.close();
            r.devPerfect();
          } },
          { label: "LOSE NOW", act: () => {
            dev.close();
            r.endRun(false, "DEV");
          } },
          { label: "SPAWN \u25B8", submenu: () => spawnMenu(dev) },
          { label: `HITS: ${r.devHits.length}  ${JSON.stringify(r.devHitTally())}`, act: null }
        ]
      };
    };
    return { ...build(), rebuild: build };
  }
  function infoMenu(dev) {
    const build = () => {
      const r = dev.run();
      const cur = typeof window !== "undefined" ? window.__mash_state : "?";
      const s = dev.ctx.save.slot;
      const items = [
        { label: `STATE: ${cur}`, act: null },
        { label: `SLOT: ${s ? `plugs ${totalPlugs(s)}/${MAX_PLUGS}  coins ${formatCoins(s.coins)}  diff ${s.difficulty}` : "none"}`, act: null }
      ];
      if (r) {
        items.push(
          { label: `STAGE: ${r.stage ? r.stage.id : r.bossCab || "overtime"}`, act: null },
          { label: `SEED: ${r.seed}`, act: null },
          { label: `BATTERY: ${r.battery}/${r.maxBattery()}`, act: null },
          { label: `HERO: ${r.relay ? r.relay.current : "?"}`, act: null },
          { label: `MISSION: ${r.mission.type} ${r.mission.count ?? ""}/${r.mission.n ?? ""} sat=${r.missionSatisfied()}`, act: null },
          { label: `DIST: ${Math.floor(r.distance)}/${Math.floor(r.totalDist)}`, act: null },
          { label: `ENTITIES: ob ${r.obstacles.length}  pk ${r.pickups.length}  pr ${r.projectiles.length}`, act: null }
        );
      }
      return { title: "INFO", items };
    };
    return { ...build(), rebuild: build };
  }
  function rootMenu(dev) {
    const build = () => ({
      title: "DEV MENU",
      items: [
        { label: "STAGES \u25B8", submenu: () => stagesMenu(dev) },
        { label: "BOSSES \u25B8", submenu: () => bossesMenu(dev) },
        { label: "SCENES \u25B8", submenu: () => scenesMenu(dev) },
        { label: "SAVE \u25B8", submenu: () => saveMenu(dev) },
        { label: "RUN \u25B8", submenu: () => runMenu(dev) },
        { label: "INFO \u25B8", submenu: () => infoMenu(dev) }
      ]
    });
    return { ...build(), rebuild: build };
  }
  var ROW_H = 11;
  var MAX_ROWS = 17;
  function drawMenu(ctx, dev) {
    const top = dev.top();
    if (!top) return;
    ctx.fillStyle = "rgba(11,11,20,0.86)";
    ctx.fillRect(0, 0, W, H);
    drawPanel(ctx, 8, 6, W - 16, H - 12, 3, "rgba(20,18,34,0.95)");
    const crumbs = dev.stack.map((s) => s.title).join(" / ");
    drawText(ctx, crumbs, 14, 12, GOLD);
    drawText(ctx, "\u2191\u2193 move  \u2190\u2192 adjust  ENTER pick  BKSP back  ` close", 14, H - 16, DIM, 0.75);
    const n2 = top.items.length;
    const first = Math.max(0, Math.min(n2 - MAX_ROWS, top.idx - Math.floor(MAX_ROWS / 2)));
    const shown = top.items.slice(first, first + MAX_ROWS);
    shown.forEach((item, i) => {
      const realIdx = first + i;
      const sel = realIdx === top.idx;
      const y = 26 + i * ROW_H;
      const inert = !item.act && !item.submenu && !item.adjust;
      drawText(ctx, (sel ? "> " : "  ") + item.label, 14, y, sel ? GOLD : inert ? DIM : FG, 0.85);
    });
    if (n2 > MAX_ROWS) {
      drawTextCentered(ctx, `${top.idx + 1}/${n2}`, W - 34, H - 16, DIM, 0.75);
    }
  }

  // src/dev/index.js
  var SPEEDS = [0.1, 0.25, 0.5, 1, 2, 4];
  var Dev = {
    enabled: false,
    open: false,
    ctx: null,
    // { Flow, save }
    stack: [],
    // breadcrumb of {title, items, idx}
    timeScale: 1,
    stepOnce: false,
    paused: false,
    seedLock: null,
    // when set, every dev-launched run reuses this seed
    toast: null,
    toastT: 0,
    install(ctx) {
      if (!this.enabled || this.ctx) return;
      this.ctx = ctx;
      window.addEventListener("keydown", (e) => this.onKey(e));
      if (typeof window !== "undefined") window.__mash_dev = this;
    },
    // ---------------------------------------------------------------- helpers
    say(msg) {
      this.toast = msg;
      this.toastT = 2.5;
    },
    run() {
      const cur = typeof window !== "undefined" ? window.__mash_cur : null;
      if (!cur) return null;
      if (cur.run && cur.run.player) return cur.run;
      return cur.player ? cur : null;
    },
    openMenu() {
      this.stack = [{ ...rootMenu(this), idx: 0 }];
      this.open = true;
    },
    close() {
      this.open = false;
      this.stack = [];
    },
    push(menu) {
      this.stack.push({ ...menu, idx: 0 });
    },
    pop() {
      this.stack.pop();
      if (!this.stack.length) this.open = false;
    },
    top() {
      return this.stack[this.stack.length - 1];
    },
    // Rebuild the current screen in place, so toggles relabel immediately.
    refresh() {
      const top = this.top();
      if (top && top.rebuild) {
        const next = top.rebuild(this);
        top.items = next.items;
        top.title = next.title;
        if (top.idx >= top.items.length) top.idx = Math.max(0, top.items.length - 1);
      }
    },
    cycleSpeed(dir) {
      const i = SPEEDS.indexOf(this.timeScale);
      const next = SPEEDS[Math.min(SPEEDS.length - 1, Math.max(0, (i < 0 ? 3 : i) + dir))];
      this.timeScale = next;
      this.say(`SPEED x${next}`);
    },
    // ------------------------------------------------------------------ input
    onKey(e) {
      if (!this.enabled) return;
      if (e.repeat && e.code !== "ArrowUp" && e.code !== "ArrowDown") return;
      if (e.code === "Backquote") {
        this.open ? this.close() : this.openMenu();
        e.preventDefault();
        return;
      }
      if (!this.open) {
        const cur = typeof window !== "undefined" ? window.__mash_cur : null;
        if (e.code === "BracketLeft") {
          this.cycleSpeed(-1);
          e.preventDefault();
        } else if (e.code === "BracketRight") {
          this.cycleSpeed(1);
          e.preventDefault();
        } else if (e.code === "Backslash") {
          this.paused = !this.paused;
          this.say(this.paused ? "PAUSED" : "RESUMED");
          e.preventDefault();
        } else if (e.code === "Period" && this.paused) {
          this.stepOnce = true;
          e.preventDefault();
        } else if (e.code === "Tab" && cur && cur.takeOver) {
          cur.takeOver();
          this.say("YOU HAVE THE CONTROLS");
          e.preventDefault();
        }
        return;
      }
      const top = this.top();
      if (!top) return;
      const n2 = top.items.length;
      switch (e.code) {
        case "ArrowUp":
          top.idx = (top.idx + n2 - 1) % n2;
          break;
        case "ArrowDown":
          top.idx = (top.idx + 1) % n2;
          break;
        case "ArrowLeft":
        case "ArrowRight": {
          const item = top.items[top.idx];
          if (item && item.adjust) {
            item.adjust(e.code === "ArrowRight" ? 1 : -1);
            this.refresh();
          }
          break;
        }
        case "Enter":
        case "Space": {
          const item = top.items[top.idx];
          if (!item) break;
          if (item.submenu) this.push(item.submenu(this));
          else if (item.act) {
            item.act();
            this.refresh();
          }
          break;
        }
        case "Backspace":
        case "Escape":
          this.pop();
          break;
        default:
          return;
      }
      e.preventDefault();
    },
    // ------------------------------------------------------------------ frame
    // Returns true when the dev overlay has consumed the frame.
    update(dt) {
      if (!this.enabled) return false;
      if (this.toastT > 0) this.toastT -= dt;
      if (this.open) {
        Input.endFrame();
        return true;
      }
      if (this.paused && !this.stepOnce) {
        Input.endFrame();
        return true;
      }
      this.stepOnce = false;
      return false;
    },
    draw(ctx) {
      if (!this.enabled) return;
      const paint = (d) => {
        if (this.open) drawMenu(d, this);
        else this.drawStatusStrip(d);
      };
      if (!pushOverlayDraw(paint)) paint(ctx);
    },
    // A thin always-on strip while the menu is closed, so a dev build is never
    // ambiguous about being in a modified state.
    drawStatusStrip(ctx) {
      const bits = [];
      if (this.timeScale !== 1) bits.push(`x${this.timeScale}`);
      if (this.paused) bits.push("PAUSED");
      const r = this.run();
      if (r && r.devInvuln) bits.push(`CRASH ${r.devHits.length}`);
      if (this.toastT > 0 && this.toast) bits.push(this.toast);
      if (!bits.length) return;
      const label = bits.join("  ");
      drawPanel(ctx, 2, H - 13, 8 + label.length * 4, 11, 2, "rgba(11,11,20,0.82)");
      drawText(ctx, label, 6, H - 10, "#f6d33c", 0.75);
    }
  };

  // src/main.js
  save.load();
  setShakeScale(save.settings.screenShake);
  var ATTRACT_CYCLE = ["cast", "demo", "demo"];
  var attractStep = 0;
  var nextAttract = () => ATTRACT_CYCLE[attractStep % ATTRACT_CYCLE.length];
  var Flow = {
    lastTeam: null,
    pendingCab: null,
    pendingStage: null,
    pendingCorrupted: [],
    pendingBoss: false,
    toTitle(opts = {}) {
      setState(new TitleState({
        save,
        attractDelay: opts.attractDelay,
        attractLabel: nextAttract() === "cast" ? "CAST ROLL" : "DEMO",
        onAttract: () => Flow.startAttract(),
        onSlotChosen: (i, isNew) => {
          Flow.hubPosition = null;
          if (isNew) {
            save.newSlot(i, Date.now());
            setState(new DifficultyState({ save, onDone: () => setState(new IntroState({ onDone: () => {
              save.slot.campaign.storyFlags.sawIntro = true;
              save.persist();
              Flow.toHub();
            } })) }));
          } else {
            save.selectSlot(i);
            Flow.toHub();
          }
        },
        onOvertime: () => {
          const slotIdx = save.data.slots.findIndex((s) => s && s.campaign.storyFlags.sawEnding);
          if (slotIdx >= 0) {
            save.selectSlot(slotIdx);
            Flow.startOvertime();
          }
        },
        onSettings: () => setState(new SettingsState({ save, onDone: () => {
          setShakeScale(save.settings.screenShake);
          Flow.toTitle();
        } })),
        onHowTo: () => setState(new HowToPlayState({ onDone: () => Flow.toTitle() })),
        onGuide: () => setState(new FieldGuideState({ settings: save.settings, onDone: () => Flow.toTitle() })),
        onSoundTest: () => setState(new SoundTestState({ onDone: () => Flow.toTitle() }))
      }));
    },
    // cameo=false for the results hand-off: the run already ended on a cast
    // celebration, so neither shutter on the way out needs a hero in it.
    toHub(cameo2 = true) {
      const go = cameo2 ? setState : setStateNoCameo;
      go(new HubState({ save, flow: Flow }));
    },
    startAttract() {
      const kind = nextAttract();
      attractStep++;
      const opts = {
        realSettings: save.settings,
        onExit: (auto) => Flow.toTitle(auto ? { attractDelay: 10 } : {})
      };
      setState(kind === "cast" ? new CastState(opts) : new AttractState(opts));
    },
    openCabinet(cab) {
      setState(new StageSelectState({ save, cab, flow: Flow }));
    },
    // Team select is gone: stages start immediately with the full cast in play.
    pickTeam(cab, stage, corrupted, boss = false) {
      if (boss) Flow.startBoss(cab.id);
      else Flow.startStage(cab, stage, this.pendingCorrupted = corrupted || []);
    },
    startStage(cab, stage, corrupted) {
      setState(new BriefingState({ cab, stage, onDone: () => Flow.launchStage(cab, stage, corrupted) }));
    },
    // seedOverride: dev-menu seed lock. Runs are deterministic given a seed
    // (Rng uses named streams), so pinning it makes a spawn pattern replayable.
    launchStage(cab, stage, corrupted, seedOverride) {
      const flags = save.slot.campaign.storyFlags;
      const startingPowerup = flags.pendingPowerup || null;
      if (startingPowerup) {
        delete flags.pendingPowerup;
        save.persist();
      }
      setState(new RunState({
        stage,
        save,
        startingPowerup,
        seed: seedOverride ?? (Date.now() ^ (stage ? stage.id.length * 7919 : 0)) >>> 0,
        difficulty: save.slot.difficulty,
        corrupted,
        onEnd: (result) => {
          Flow.lastTeam = result.team;
          const gains = applyResult(save, result);
          setStateNoCameo(new ResultsState({ result, gains, save, onDone: () => Flow.toHub(false) }));
        }
      }));
    },
    startBoss(cabId, seedOverride) {
      setState(new BossState({
        bossCab: cabId,
        save,
        seed: seedOverride ?? (Date.now() ^ 45141) >>> 0,
        difficulty: save.slot.difficulty,
        onEnd: (result) => {
          Flow.lastTeam = result.team;
          if (result.success) {
            save.slot.campaign.bossesDown[cabId] = true;
            save.persist();
          }
          const gains = applyResult(save, result);
          setStateNoCameo(new ResultsState({ result, gains, save, onDone: () => {
            if (result.success && cabId === "surge") Flow.startFinale();
            else Flow.toHub(false);
          } }));
        }
      }));
    },
    startFinale() {
      setState(new FinaleState({ save, onDone: () => Flow.toHub() }));
    },
    startOvertime(seedOverride) {
      setState(new RunState({
        overtime: true,
        save,
        seed: seedOverride ?? dailySeed(),
        difficulty: save.slot.difficulty,
        onEnd: (result) => {
          Flow.lastTeam = result.team;
          const gains = applyResult(save, result);
          setStateNoCameo(new ResultsState({ result, gains, save, onDone: () => Flow.toHub(false) }));
        }
      }));
    },
    openBench() {
      setState(new BenchState({ save, flow: Flow }));
    },
    openShop() {
      setState(new ShopState({ save, flow: Flow }));
    },
    openArcade() {
      setState(new ArcadeState({ save, flow: Flow }));
    },
    playMinigame(game) {
      const flags = save.slot.campaign.storyFlags;
      save.slot.coins -= ARCADE_PLAY_COST;
      save.persist();
      const rr2 = new Rng(game + save.slot.stats.runs + save.slot.coins);
      const reward = rr2.pick(Object.keys(POWER_DEFS));
      setState(new MinigameState({
        game,
        seed: Date.now() & 65535,
        settings: save.settings,
        bonusText: `BONUS: ${POWER_DEFS[reward].name} ON YOUR NEXT RUN`,
        onEnd: (success) => {
          if (success) {
            save.slot.coins += REWARDS.arcadeWin;
            flags.pendingPowerup = reward;
            save.persist();
          }
          Flow.openArcade();
        }
      }));
    }
  };
  function boot() {
    initRenderer();
    setFancyFx(save.settings.fancyFx);
    Input.init();
    buildAllSprites();
    Audio.setVolumes(save.settings.volumes);
    Audio.ensure();
    Audio.setMuted(save.settings.muted);
    Input.onAnyGesture = () => {
      Audio.ensure();
      Audio.setVolumes(save.settings.volumes);
      Audio.setMuted(save.settings.muted);
    };
    Dev.enabled = !!(typeof window !== "undefined" && window.__MASH_BUILD__);
    if (Dev.enabled) Dev.install({ Flow, save });
    Flow.toTitle();
    startLoop({
      update: (dt) => {
        if (Dev.update(dt)) return;
        updateState(dt * Dev.timeScale);
      },
      draw: () => {
        drawState(bctx);
        Dev.draw(bctx);
        blit();
      }
    });
    window.__mash_booted = true;
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
</body>
