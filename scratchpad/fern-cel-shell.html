<title>Fernwick celebration — frame strip</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 20px; background: #14121a; color: #e8e4f0;
         font: 13px/1.5 -apple-system, system-ui, sans-serif; }
  h2 { font-size: 15px; margin: 24px 0 2px; }
  .note { color: #8f88a6; margin: 0 0 10px; font-size: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
  .card { background: #1e1b28; border: 1px solid #2c2838; border-radius: 6px;
          padding: 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  canvas { image-rendering: pixelated; background:
    repeating-conic-gradient(#242030 0% 25%, #1b1826 0% 50%) 50% / 12px 12px; border-radius: 3px; }
  .cap { color: #b8b0cc; font-size: 10px; letter-spacing: .04em; }
</style>
